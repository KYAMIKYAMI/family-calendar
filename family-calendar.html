<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="家族カレンダー">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>家族カレンダー</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: #f7f7f5; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useCallback, useEffect } = React;


const COLORS = ['#2d6a4f','#e67e22','#2980b9','#c0392b','#8e44ad'];
const SK = 'fc_ev1';
const AC = '#2d6a4f';
const ACL = '#e8f4ee';
const WEEKDAYS = ['日','月','火','水','木','金','土'];
const RECURRENCE_LABELS = { none:'なし', weekly:'毎週', monthly:'毎月', yearly:'毎年' };
const WEEK_H = 58;
const VISIBLE_WEEKS = 6;
const BUFFER_WEEKS = 6;
const TOTAL_WEEKS = VISIBLE_WEEKS + BUFFER_WEEKS * 2;

function loadEv() { try { return JSON.parse(localStorage.getItem(SK)||'[]'); } catch { return []; } }
function saveEv(l) { localStorage.setItem(SK, JSON.stringify(l)); }
function toDS(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function genId() { return 'e'+Math.random().toString(36).substr(2,8); }
function addDays(d, n) { const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function weekSunday(d) { const r=new Date(d); r.setDate(r.getDate()-r.getDay()); r.setHours(0,0,0,0); return r; }
function matchesRecurrence(ev, s) {
  const d=new Date(s+'T12:00:00'), o=new Date((ev.startDate||ev.date)+'T12:00:00');
  if(ev.recurrence==='weekly') return d.getDay()===o.getDay();
  if(ev.recurrence==='monthly') return d.getDate()===o.getDate();
  if(ev.recurrence==='yearly') return d.getMonth()===o.getMonth()&&d.getDate()===o.getDate();
  return false;
}
function onDate(ev, s) {
  const start=ev.startDate||ev.date;
  if(ev.recurrence&&ev.recurrence!=='none') return s>=start&&matchesRecurrence(ev,s);
  return start<=s&&s<=(ev.endDate||ev.date||start);
}
function resizeImg(file, cb) {
  const r=new FileReader(); r.onload=e=>{ const img=new Image(); img.onload=()=>{ const M=800,c=document.createElement('canvas'); let w=img.width,h=img.height; if(w>h&&w>M){h=h*M/w;w=M;}else if(h>M){w=w*M/h;h=M;} c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);cb(c.toDataURL('image/jpeg',.7));}; img.src=e.target.result;}; r.readAsDataURL(file);
}
function recurrenceLabel(ev) {
  if(!ev.recurrence||ev.recurrence==='none') return null;
  const o=new Date((ev.startDate||ev.date)+'T12:00:00');
  if(ev.recurrence==='weekly') return `毎週${WEEKDAYS[o.getDay()]}曜日`;
  if(ev.recurrence==='monthly') return `毎月${o.getDate()}日`;
  if(ev.recurrence==='yearly') return `毎年${o.getMonth()+1}月${o.getDate()}日`;
}

function App() {
  const [events, setEvents] = useState(loadEv);
  const [sel, setSel] = useState(() => new Date());
  const [modal, setModal] = useState(null); // 'add' | 'edit'
  const [editEv, setEditEv] = useState(null);
  const [phState, setPhState] = useState({eid:null,i:0});
  const [toast, setToast] = useState(null);
  const tmr = useRef(null);
  const todayStr = toDS(new Date());
  const selStr = toDS(sel);

  const [anchorWeek, setAnchorWeek] = useState(() => {
    const t=new Date(); return addDays(weekSunday(new Date(t.getFullYear(),t.getMonth(),1)),-BUFFER_WEEKS*7);
  });
  const [translateY, setTranslateY] = useState(-(BUFFER_WEEKS*WEEK_H));
  const isCalDrag = useRef(false);
  const calStartY = useRef(0);
  const calStartTY = useRef(0);
  const calLastY = useRef(0);
  const calLastT = useRef(0);
  const calVel = useRef(0);
  const rafId = useRef(null);
  const containerRef = useRef(null);

  const showToast = useCallback((msg) => {
    setToast(msg); clearTimeout(tmr.current);
    tmr.current = setTimeout(()=>setToast(null), 2200);
  }, []);

  const addEv = useCallback((ev) => {
    const next=[...events,{...ev,id:genId()}]; setEvents(next); saveEv(next); showToast('追加しました');
  }, [events, showToast]);

  const updateEv = useCallback((id, data) => {
    const next=events.map(e=>e.id===id?{...e,...data}:e); setEvents(next); saveEv(next); showToast('更新しました');
  }, [events, showToast]);

  const delEv = useCallback((id) => {
    const next=events.filter(e=>e.id!==id); setEvents(next); saveEv(next); showToast('削除しました');
  }, [events, showToast]);

  const snapAndRecycle = useCallback((ty) => {
    const sn=Math.round(ty/WEEK_H)*WEEK_H;
    const tb=BUFFER_WEEKS+Math.round(sn/WEEK_H);
    if(tb<3){setAnchorWeek(p=>addDays(p,28));return sn+4*WEEK_H;}
    if(tb>TOTAL_WEEKS-VISIBLE_WEEKS-3){setAnchorWeek(p=>addDays(p,-28));return sn-4*WEEK_H;}
    return sn;
  },[]);
  const momentum = useCallback((v0)=>{
    let v=v0;
    const step=()=>{ if(Math.abs(v)<0.5){setTranslateY(p=>snapAndRecycle(p));return;} v*=0.88; setTranslateY(p=>p+v); rafId.current=requestAnimationFrame(step); };
    rafId.current=requestAnimationFrame(step);
  },[snapAndRecycle]);
  const animateTo = useCallback((from,to)=>{
    cancelAnimationFrame(rafId.current); let pos=from;
    const step=()=>{ const d=to-pos; if(Math.abs(d)<0.8){setTranslateY(snapAndRecycle(to));return;} pos+=d*0.2; setTranslateY(pos); rafId.current=requestAnimationFrame(step); };
    rafId.current=requestAnimationFrame(step);
  },[snapAndRecycle]);

  const tapStartX = useRef(0);
  const tapStartY2 = useRef(0);

  const calTS = useCallback((e)=>{
    e.preventDefault(); cancelAnimationFrame(rafId.current);
    isCalDrag.current=true;
    calStartY.current=e.touches[0].clientY;
    calStartTY.current=translateY;
    calLastY.current=e.touches[0].clientY;
    calLastT.current=Date.now(); calVel.current=0;
    tapStartX.current=e.touches[0].clientX;
    tapStartY2.current=e.touches[0].clientY;
  },[translateY]);
  const calTM = useCallback((e)=>{
    if(!isCalDrag.current) return; e.preventDefault();
    const y=e.touches[0].clientY,now=Date.now(),dt=now-calLastT.current;
    if(dt>0) calVel.current=(y-calLastY.current)/dt*16;
    calLastY.current=y; calLastT.current=now;
    setTranslateY(calStartTY.current+(y-calStartY.current));
  },[]);
  const calTE = useCallback((e)=>{
    if(!isCalDrag.current) return; e.preventDefault(); isCalDrag.current=false;
    const dx=Math.abs(e.changedTouches[0].clientX-tapStartX.current);
    const dy=Math.abs(e.changedTouches[0].clientY-tapStartY2.current);
    // 移動量が小さければタップ → 下のelementのonClickを手動で叩く
    if(dx<8&&dy<8){
      const x=e.changedTouches[0].clientX, y=e.changedTouches[0].clientY;
      const el=document.elementFromPoint(x,y);
      if(el) el.click();
      setTranslateY(p=>snapAndRecycle(p));
      return;
    }
    Math.abs(calVel.current)>2?momentum(calVel.current):setTranslateY(p=>snapAndRecycle(p));
  },[momentum,snapAndRecycle]);

  useEffect(()=>{
    const el=containerRef.current; if(!el) return;
    el.addEventListener('touchstart',calTS,{passive:false});
    el.addEventListener('touchmove',calTM,{passive:false});
    el.addEventListener('touchend',calTE,{passive:false});
    return()=>{ el.removeEventListener('touchstart',calTS); el.removeEventListener('touchmove',calTM); el.removeEventListener('touchend',calTE); };
  },[calTS,calTM,calTE]);

  const topWeekIndex=-Math.round(translateY/WEEK_H);
  const midWeek=addDays(addDays(anchorWeek,topWeekIndex*7),3*7);
  const dispYear=midWeek.getFullYear(), dispMonth=midWeek.getMonth();

  const goToday=()=>{
    cancelAnimationFrame(rafId.current);
    const t=new Date();
    setAnchorWeek(addDays(weekSunday(new Date(t.getFullYear(),t.getMonth(),1)),-BUFFER_WEEKS*7));
    setTranslateY(-(BUFFER_WEEKS*WEEK_H)); setSel(t);
  };

  const allWeeks=[];
  for(let i=0;i<TOTAL_WEEKS;i++) allWeeks.push([0,1,2,3,4,5,6].map(d=>addDays(addDays(anchorWeek,i*7),d)));
  const dayEvs=events.filter(e=>onDate(e,selStr)).sort((a,b)=>(a.time||'99').localeCompare(b.time||'99'));

  return(
    <div style={{fontFamily:'-apple-system,Hiragino Sans,sans-serif',background:'#f7f7f5',color:'#1a1a18',maxWidth:480,margin:'0 auto',minHeight:'100vh'}}>
      <div style={{background:'#fff',borderBottom:'1px solid #e8e8e4',padding:'13px 16px',position:'sticky',top:0,zIndex:100,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span style={{fontSize:15,fontWeight:600}}>📅 家族カレンダー</span>
        <button onClick={goToday} style={{background:'#f2f2ef',border:'none',borderRadius:8,padding:'5px 10px',fontSize:12,color:'#6b6b67',cursor:'pointer',fontWeight:500}}>今日</button>
      </div>
      <div style={{background:'#fff',padding:'10px 16px 6px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <button onClick={()=>{cancelAnimationFrame(rafId.current);setTranslateY(p=>{animateTo(p,snapAndRecycle(p-4*WEEK_H));return p;});}} style={{background:'#f2f2ef',border:'none',borderRadius:8,padding:'5px 12px',fontSize:16,color:'#6b6b67',cursor:'pointer'}}>‹</button>
        <span style={{fontSize:16,fontWeight:600}}>{dispYear}年{dispMonth+1}月</span>
        <button onClick={()=>{cancelAnimationFrame(rafId.current);setTranslateY(p=>{animateTo(p,snapAndRecycle(p+4*WEEK_H));return p;});}} style={{background:'#f2f2ef',border:'none',borderRadius:8,padding:'5px 12px',fontSize:16,color:'#6b6b67',cursor:'pointer'}}>›</button>
      </div>
      <div style={{background:'#fff',display:'grid',gridTemplateColumns:'repeat(7,1fr)',textAlign:'center',padding:'4px 6px',borderBottom:'1px solid #e8e8e4'}}>
        {WEEKDAYS.map((d,i)=><span key={d} style={{fontSize:10,fontWeight:500,color:i===0?'#c0392b':i===6?'#2980b9':'#a8a8a4'}}>{d}</span>)}
      </div>
      <div ref={containerRef} style={{background:'#fff',height:WEEK_H*VISIBLE_WEEKS,overflow:'hidden',userSelect:'none',touchAction:'none'}}>
        <div style={{transform:`translateY(${translateY}px)`,willChange:'transform'}}>
          {allWeeks.map((week,wi)=>(
            <WeekRow key={wi} week={week} selStr={selStr} todayStr={todayStr} events={events} onSelect={setSel} onEditEv={ev=>{setEditEv(ev);setModal('edit');}} dispMonth={dispMonth} height={WEEK_H}/>
          ))}
        </div>
      </div>

      <div style={{background:'#fff',marginTop:6,padding:'16px 14px 90px',borderTop:'1px solid #e8e8e4'}}>
        <div style={{fontSize:10,fontWeight:600,color:'#6b6b67',letterSpacing:0.5,textTransform:'uppercase',marginBottom:12}}>
          {selStr===todayStr?`今日（${sel.getMonth()+1}月${sel.getDate()}日）の予定`:`${sel.getMonth()+1}月${sel.getDate()}日の予定`}
        </div>
        {dayEvs.length===0
          ?<div style={{color:'#a8a8a4',fontSize:12,textAlign:'center',padding:'20px 0'}}>予定はありません</div>
          :dayEvs.map(ev=>(
            <EvCard key={ev.id} ev={ev}
              onTap={()=>{setEditEv(ev);setModal('edit');}}
              onDel={delEv}
              onPhoto={(eid,i)=>{setPhState({eid,i});setModal('photo');}}
            />
          ))
        }
      </div>

      <div style={{position:'fixed',bottom:24,right:20,zIndex:200,display:'flex',flexDirection:'column',gap:12,alignItems:'center'}}>
        <button onClick={()=>setModal('voice')} style={{width:44,height:44,borderRadius:'50%',background:'#fff',color:AC,border:`2px solid ${AC}`,fontSize:20,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 2px 10px rgba(45,106,79,.2)'}}>🎤</button>
        <button onClick={()=>setModal('add')} style={{width:50,height:50,borderRadius:'50%',background:AC,color:'#fff',border:'none',fontSize:26,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 4px 16px rgba(45,106,79,.35)'}}>＋</button>
      </div>

      {modal==='voice'&&<VoiceModal sel={sel} onSave={ev=>{addEv(ev);setModal(null);}} onClose={()=>setModal(null)}/>}
      {modal==='add'&&<EventModal sel={sel} onSave={ev=>{addEv(ev);setModal(null);}} onClose={()=>setModal(null)}/>}
      {modal==='edit'&&editEv&&<EventModal sel={sel} initial={editEv} onSave={data=>{updateEv(editEv.id,data);setModal(null);setEditEv(null);}} onClose={()=>{setModal(null);setEditEv(null);}} onDel={()=>{delEv(editEv.id);setModal(null);setEditEv(null);}}/>}
      {modal==='photo'&&<PhModal events={events} state={phState} setState={setPhState} onClose={()=>setModal(null)}/>}
      {toast&&<div style={{position:'fixed',bottom:88,left:'50%',transform:'translateX(-50%)',background:'#1a1a18',color:'#fff',padding:'9px 18px',borderRadius:20,fontSize:12,fontWeight:500,zIndex:400,whiteSpace:'nowrap'}}>{toast}</div>}
    </div>
  );
}

function WeekRow({week,selStr,todayStr,events,onSelect,onEditEv,dispMonth,height}){
  const ws=toDS(week[0]),we=toDS(week[6]);
  const normalEvs=events.filter(ev=>{if(ev.recurrence&&ev.recurrence!=='none')return false;const a=ev.startDate||ev.date,b=ev.endDate||ev.date||a;return a<=we&&b>=ws;});
  const recurEvs=events.filter(ev=>{if(!ev.recurrence||ev.recurrence==='none')return false;return week.some(c=>onDate(ev,toDS(c)));});
  const expanded=[];
  recurEvs.forEach(ev=>week.forEach(c=>{const ds2=toDS(c);if(onDate(ev,ds2))expanded.push({...ev,startDate:ds2,endDate:ds2,_recur:true});}));
  const allEvs=[...normalEvs,...expanded].sort((a,b)=>{const as2=a.startDate||a.date,bs2=b.startDate||b.date,al=new Date(a.endDate||a.date||as2)-new Date(as2),bl=new Date(b.endDate||b.date||bs2)-new Date(bs2);return as2.localeCompare(bs2)||bl-al;});
  const lanes=[];
  allEvs.forEach(ev=>{const es=ev.startDate||ev.date,ee=ev.endDate||ev.date||es;let li=0;for(;;){if(!lanes[li])lanes[li]=[];if(!lanes[li].some(o=>{const os=o.startDate||o.date,oe=o.endDate||o.date||os;return es<=oe&&ee>=os;})){lanes[li].push(ev);break;}li++;}});
  return(
    <div style={{height,display:'flex',flexDirection:'column',paddingTop:2,borderBottom:'1px solid #f2f2ef'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',padding:'0 4px'}}>
        {week.map((cell,idx)=>{
          const d2=toDS(cell),isT=d2===todayStr,isSel=d2===selStr,isOther=cell.getMonth()!==dispMonth;
          const col=idx===0?'#c0392b':idx===6?'#2980b9':'#1a1a18';
          return(
            <div key={idx} onClick={()=>onSelect(cell)} style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'2px 1px',cursor:'pointer',borderRadius:6,background:isSel&&!isT?ACL:'transparent'}}>
              <span style={{fontSize:11,lineHeight:'20px',color:isOther?'#c8c8c4':isT?'#fff':col,background:isT?AC:'transparent',borderRadius:'50%',width:isT?20:undefined,height:isT?20:undefined,display:isT?'flex':undefined,alignItems:isT?'center':undefined,justifyContent:isT?'center':undefined,fontWeight:isT?600:400}}>
                {cell.getDate()}
              </span>
            </div>
          );
        })}
      </div>
      {allEvs.length>0&&(
        <div style={{display:'flex',flexDirection:'column',gap:1,padding:'1px 4px 0'}}>
          {lanes.slice(0,3).map((lane,li)=>{
            const used=new Set(),bars=[];
            lane.slice().sort((a,b)=>(a.startDate||a.date).localeCompare(b.startDate||b.date)).forEach(ev=>{
              const es=ev.startDate||ev.date,ee=ev.endDate||ev.date||es;let cs=-1,ce=-1;
              week.forEach((c,i)=>{const s2=toDS(c);if(s2>=es&&s2<=ee){if(cs<0)cs=i;ce=i;}});
              if(cs<0)return;for(let i=cs;i<=ce;i++)used.add(i);
              const rL=es===toDS(week[cs]),rR=ee===toDS(week[ce]);
              const br=rL&&rR?'4px':rL?'4px 0 0 4px':rR?'0 4px 4px 0':'0';
              bars.push(<div key={ev.id+es} onClick={e=>{e.stopPropagation();onSelect(week[cs]);const original=events.find(x=>x.id===ev.id);if(original)onEditEv(original);}} style={{height:12,lineHeight:'12px',fontSize:9,color:'#fff',padding:'0 4px',overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis',cursor:'pointer',alignSelf:'center',background:ev.color||AC,gridColumn:`${cs+1}/${ce+2}`,borderRadius:br,marginLeft:rL?1:0,marginRight:rR?1:0,fontWeight:500,opacity:ev._recur?.85:1}}>{(rL||cs===0)?(ev._recur?'🔁 '+ev.title:ev.title):''}</div>);
            });
            week.forEach((_,i)=>{if(!used.has(i))bars.push(<div key={'p'+li+i} style={{gridColumn:i+1}}/>);});
            return <div key={li} style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',height:13}}>{bars}</div>;
          })}
          {lanes.length>3&&<div style={{fontSize:9,color:'#a8a8a4',textAlign:'right',paddingRight:2}}>+{lanes.length-3}</div>}
        </div>
      )}
    </div>
  );
}

function EvCard({ev,onTap,onDel,onPhoto}){
  const a=ev.startDate||ev.date,b=ev.endDate||ev.date||a;
  const photos=ev.photos||(ev.photo?[ev.photo]:[]);
  const recurLbl=recurrenceLabel(ev);
  return(
    <div onClick={onTap} style={{padding:'11px 13px',borderRadius:12,marginBottom:7,background:'#f2f2ef',borderLeft:`3px solid ${ev.color||AC}`,cursor:'pointer',transition:'opacity 0.1s',userSelect:'none'}}>
      <div style={{display:'flex',alignItems:'flex-start'}}>
        <div style={{flex:1}}>
          <div style={{fontSize:14,fontWeight:500}}>{ev.title}</div>
          {recurLbl?<div style={{fontSize:11,color:'#6b6b67',marginTop:2}}>🔁 {recurLbl}</div>:a!==b&&<div style={{fontSize:11,color:'#6b6b67',marginTop:2}}>📅 {a} 〜 {b}</div>}
          {ev.time&&<div style={{fontSize:11,color:'#6b6b67',marginTop:2}}>🕐 {ev.time}</div>}
          {ev.memo&&<div style={{fontSize:11,color:'#6b6b67',marginTop:2}}>📝 {ev.memo}</div>}
        </div>
        <button onClick={e=>{e.stopPropagation();if(confirm('削除しますか？'))onDel(ev.id);}} style={{background:'none',border:'none',color:'#a8a8a4',fontSize:14,cursor:'pointer',padding:'0 2px'}}>✕</button>
      </div>
      {photos.length>0&&<div onClick={e=>e.stopPropagation()} style={{display:'grid',gridTemplateColumns:photos.length===1?'1fr':'repeat(3,1fr)',gap:3,marginTop:8}}>{photos.map((src,i)=><img key={i} src={src} onClick={()=>onPhoto(ev.id,i)} style={{width:'100%',aspectRatio:photos.length===1?'16/9':'1',objectFit:'cover',borderRadius:6,cursor:'pointer'}}/>)}</div>}
    </div>
  );
}

// 追加・編集共通モーダル
function EventModal({sel,initial,onSave,onClose,onDel}){
  const isEdit=!!initial;
  const [title,setTitle]=useState(initial?.title||'');
  const [start,setStart]=useState(initial?.startDate||initial?.date||toDS(sel));
  const [end,setEnd]=useState(initial?.endDate||initial?.startDate||initial?.date||toDS(sel));
  const [time,setTime]=useState(initial?.time||'');
  const [memo,setMemo]=useState(initial?.memo||'');
  const [color,setColor]=useState(initial?.color||COLORS[0]);
  const [photos,setPhotos]=useState(initial?.photos||(initial?.photo?[initial.photo]:[]));
  const [recurrence,setRecurrence]=useState(initial?.recurrence||'none');
  const fileRef=useRef();
  const handleFiles=e=>{Array.from(e.target.files||[]).slice(0,10-photos.length).forEach(f=>resizeImg(f,url=>setPhotos(p=>[...p,url])));e.target.value='';};
  const save=()=>{
    if(!title.trim()){alert('タイトルを入力してください');return;}
    onSave({title:title.trim(),startDate:start,endDate:recurrence!=='none'?start:(end||start),date:start,time,memo:memo.trim(),color,recurrence,photos:photos.length?[...photos]:null,photo:photos[0]||null});
  };
  const recurPreview=()=>{const d=new Date(start+'T12:00:00');if(recurrence==='weekly')return`毎週${WEEKDAYS[d.getDay()]}曜日に繰り返し`;if(recurrence==='monthly')return`毎月${d.getDate()}日に繰り返し`;if(recurrence==='yearly')return`毎年${d.getMonth()+1}月${d.getDate()}日に繰り返し`;};
  const inp={width:'100%',padding:'10px 12px',border:'1.5px solid #e8e8e4',borderRadius:8,fontSize:14,fontFamily:'inherit',background:'#fff',color:'#1a1a18',outline:'none',marginBottom:13};
  const lbl={fontSize:10,color:'#a8a8a4',fontWeight:500,letterSpacing:0.5,textTransform:'uppercase',display:'block',marginBottom:5};
  return(
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.4)',display:'flex',alignItems:'flex-end',zIndex:300,backdropFilter:'blur(2px)'}}>
      <div onClick={e=>e.stopPropagation()} style={{background:'#fff',borderRadius:'18px 18px 0 0',padding:'22px 18px 36px',width:'100%',maxWidth:480,margin:'0 auto',maxHeight:'90vh',overflowY:'auto'}}>
        <div style={{width:32,height:3,background:'#e8e8e4',borderRadius:2,margin:'0 auto 16px'}}/>
        <div style={{fontSize:16,fontWeight:600,marginBottom:16}}>{isEdit?'予定を編集':'予定を追加'}</div>
        <label style={lbl}>タイトル</label>
        <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="例：旅行、誕生日..." style={inp}/>
        <label style={lbl}>繰り返し</label>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6,marginBottom:13}}>
          {Object.entries(RECURRENCE_LABELS).map(([val,l2])=>(
            <button key={val} onClick={()=>setRecurrence(val)} style={{padding:'8px 4px',borderRadius:8,fontSize:12,fontWeight:500,border:`1.5px solid ${recurrence===val?AC:'#e8e8e4'}`,background:recurrence===val?ACL:'#fff',color:recurrence===val?AC:'#6b6b67',cursor:'pointer'}}>{l2}</button>
          ))}
        </div>
        {recurPreview()&&<div style={{fontSize:11,color:AC,background:ACL,borderRadius:8,padding:'7px 12px',marginBottom:13}}>🔁 {recurPreview()}</div>}
        <label style={lbl}>{recurrence!=='none'?'開始日':'期間'}</label>
        {recurrence!=='none'
          ?<input type="date" value={start} onChange={e=>setStart(e.target.value)} style={inp}/>
          :<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:13}}>
            <div><label style={{fontSize:10,color:'#a8a8a4',display:'block',marginBottom:4}}>開始日</label><input type="date" value={start} onChange={e=>{setStart(e.target.value);if(!end||end<e.target.value)setEnd(e.target.value);}} style={{...inp,marginBottom:0}}/></div>
            <div><label style={{fontSize:10,color:'#a8a8a4',display:'block',marginBottom:4}}>終了日</label><input type="date" value={end} onChange={e=>setEnd(e.target.value)} style={{...inp,marginBottom:0}}/></div>
          </div>
        }
        <label style={lbl}>時間（任意）</label>
        <input type="time" value={time} onChange={e=>setTime(e.target.value)} style={inp}/>
        <label style={lbl}>メモ（任意）</label>
        <textarea value={memo} onChange={e=>setMemo(e.target.value)} placeholder="メモ..." style={{...inp,height:70,resize:'none'}}/>
        <label style={lbl}>色</label>
        <div style={{display:'flex',gap:8,marginBottom:13}}>
          {COLORS.map(c=><div key={c} onClick={()=>setColor(c)} style={{width:24,height:24,borderRadius:'50%',background:c,cursor:'pointer',border:color===c?'2.5px solid #1a1a18':'2.5px solid transparent'}}/>)}
        </div>
        <label style={lbl}>写真（最大10枚）</label>
        {photos.length>0&&<div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:5,marginBottom:10}}>{photos.map((url,i)=><div key={i} style={{position:'relative',aspectRatio:'1',borderRadius:8,overflow:'hidden'}}><img src={url} style={{width:'100%',height:'100%',objectFit:'cover'}}/><button onClick={()=>setPhotos(p=>p.filter((_,j)=>j!==i))} style={{position:'absolute',top:3,right:3,width:18,height:18,borderRadius:'50%',background:'rgba(0,0,0,.55)',color:'#fff',border:'none',fontSize:11,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button></div>)}</div>}
        {photos.length<10&&<div onClick={()=>fileRef.current?.click()} style={{border:'1.5px dashed #e8e8e4',borderRadius:8,padding:14,textAlign:'center',cursor:'pointer',color:'#a8a8a4',fontSize:12,marginBottom:13}}>📷 タップして写真を追加<input ref={fileRef} type="file" accept="image/*" multiple onChange={handleFiles} style={{display:'none'}}/></div>}
        <div style={{display:'grid',gridTemplateColumns:isEdit?'1fr 1fr 1fr':'1fr 1fr',gap:8,marginTop:4}}>
          <button onClick={onClose} style={{padding:12,borderRadius:8,fontSize:14,fontWeight:500,border:'none',cursor:'pointer',background:'#f2f2ef',color:'#6b6b67'}}>キャンセル</button>
          {isEdit&&<button onClick={()=>{if(confirm('削除しますか？'))onDel();}} style={{padding:12,borderRadius:8,fontSize:14,fontWeight:500,border:'none',cursor:'pointer',background:'#fde8e8',color:'#c0392b'}}>削除</button>}
          <button onClick={save} style={{padding:12,borderRadius:8,fontSize:14,fontWeight:500,border:'none',cursor:'pointer',background:AC,color:'#fff'}}>{isEdit?'更新':'保存'}</button>
        </div>
      </div>
    </div>
  );
}


// 音声入力→AI解析→カレンダー登録
function VoiceModal({sel, onSave, onClose}) {
  const [status, setStatus] = useState('idle'); // idle|recording|thinking|confirm|error
  const [transcript, setTranscript] = useState('');
  const [parsed, setParsed] = useState(null);
  const [errMsg, setErrMsg] = useState('');
  const recognitionRef = useRef(null);
  const todayStr = toDS(new Date());

  const startRecording = () => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { setErrMsg('このブラウザは音声入力に対応していません'); setStatus('error'); return; }
    const r = new SR();
    r.lang = 'ja-JP';
    r.continuous = false;
    r.interimResults = false;
    r.onstart = () => setStatus('recording');
    r.onresult = (e) => {
      const text = e.results[0][0].transcript;
      setTranscript(text);
      analyzeWithAI(text);
    };
    r.onerror = (e) => { setErrMsg('音声認識エラー: ' + e.error); setStatus('error'); };
    r.onend = () => { if(status === 'recording') setStatus('thinking'); };
    recognitionRef.current = r;
    r.start();
  };

  const stopRecording = () => {
    recognitionRef.current?.stop();
    setStatus('thinking');
  };

  const analyzeWithAI = async (text) => {
    setStatus('thinking');
    try {
      const today = new Date();
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 500,
          messages: [{
            role: 'user',
            content: ['今日は'+today.getFullYear()+'年'+(today.getMonth()+1)+'月'+today.getDate()+'日です。以下の音声入力からカレンダー予定を抽出してJSON形式のみで返してください。他の文字は一切不要です。音声:【'+text+'】JSONフォーマット:{title:予定タイトル, startDate:YYYY-MM-DD, endDate:YYYY-MM-DD, time:HH:MM or empty, memo:メモ or empty}ルール:明日は明日の日付、来週月曜は来週月曜の日付。時間不明ならtimeは空。終了日不明ならstartDateと同じ。タイトルは簡潔に。必ずJSONのみ返す。'].join('')
          }]
        })
      });
      const data = await res.json();
      const raw = data.content?.[0]?.text || '';
      const clean = raw.replace(/```json|```/g, '').trim();
      const obj = JSON.parse(clean);
      setParsed(obj);
      setStatus('confirm');
    } catch(e) {
      setErrMsg('解析に失敗しました。もう一度お試しください。');
      setStatus('error');
    }
  };

  const confirm = () => {
    if (!parsed) return;
    onSave({
      title: parsed.title,
      startDate: parsed.startDate || todayStr,
      endDate: parsed.endDate || parsed.startDate || todayStr,
      date: parsed.startDate || todayStr,
      time: parsed.time || '',
      memo: parsed.memo || '',
      color: COLORS[0],
      recurrence: 'none',
      photos: null, photo: null
    });
  };

  return (
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.4)',display:'flex',alignItems:'flex-end',zIndex:300,backdropFilter:'blur(2px)'}}>
      <div onClick={e=>e.stopPropagation()} style={{background:'#fff',borderRadius:'18px 18px 0 0',padding:'24px 20px 40px',width:'100%',maxWidth:480,margin:'0 auto'}}>
        <div style={{width:32,height:3,background:'#e8e8e4',borderRadius:2,margin:'0 auto 20px'}}/>
        <div style={{fontSize:16,fontWeight:600,marginBottom:20}}>🎤 音声で予定を追加</div>

        {status==='idle'&&(
          <div style={{textAlign:'center',padding:'20px 0'}}>
            <div style={{fontSize:13,color:'#6b6b67',marginBottom:24}}>マイクボタンを押して話してください例：「明日の15時に歯医者」「来週土曜に家族旅行」</div>
            <button onClick={startRecording} style={{width:80,height:80,borderRadius:'50%',background:AC,color:'#fff',border:'none',fontSize:32,cursor:'pointer',boxShadow:'0 4px 20px rgba(45,106,79,.35)'}}>🎤</button>
          </div>
        )}

        {status==='recording'&&(
          <div style={{textAlign:'center',padding:'20px 0'}}>
            <div style={{fontSize:13,color:'#c0392b',marginBottom:8,fontWeight:500}}>● 録音中...</div>
            <div style={{fontSize:13,color:'#6b6b67',marginBottom:24}}>話し終わったら止めるボタンを押してください</div>
            <button onClick={stopRecording} style={{width:80,height:80,borderRadius:'50%',background:'#c0392b',color:'#fff',border:'none',fontSize:28,cursor:'pointer',boxShadow:'0 4px 20px rgba(192,57,43,.35)'}}>⏹</button>
          </div>
        )}

        {status==='thinking'&&(
          <div style={{textAlign:'center',padding:'40px 0'}}>
            {transcript&&<div style={{fontSize:13,color:'#6b6b67',marginBottom:16,background:'#f7f7f5',padding:'10px 14px',borderRadius:10}}>「{transcript}」</div>}
            <div style={{fontSize:14,color:'#6b6b67'}}>AIが解析中...</div>
          </div>
        )}

        {status==='confirm'&&parsed&&(
          <div>
            <div style={{fontSize:12,color:'#6b6b67',marginBottom:8}}>認識した内容：「{transcript}」</div>
            <div style={{background:'#f7f7f5',borderRadius:12,padding:'14px 16px',marginBottom:20,borderLeft:`3px solid ${AC}`}}>
              <div style={{fontSize:16,fontWeight:600,marginBottom:8}}>{parsed.title}</div>
              <div style={{fontSize:13,color:'#6b6b67'}}>📅 {parsed.startDate}{parsed.endDate&&parsed.endDate!==parsed.startDate?` 〜 ${parsed.endDate}`:''}</div>
              {parsed.time&&<div style={{fontSize:13,color:'#6b6b67',marginTop:4}}>🕐 {parsed.time}</div>}
              {parsed.memo&&<div style={{fontSize:13,color:'#6b6b67',marginTop:4}}>📝 {parsed.memo}</div>}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
              <button onClick={onClose} style={{padding:12,borderRadius:8,fontSize:13,fontWeight:500,border:'none',cursor:'pointer',background:'#f2f2ef',color:'#6b6b67'}}>キャンセル</button>
              <button onClick={()=>setStatus('idle')} style={{padding:12,borderRadius:8,fontSize:13,fontWeight:500,border:'none',cursor:'pointer',background:'#fef3e2',color:'#e67e22'}}>やり直す</button>
              <button onClick={confirm} style={{padding:12,borderRadius:8,fontSize:13,fontWeight:500,border:'none',cursor:'pointer',background:AC,color:'#fff'}}>追加</button>
            </div>
          </div>
        )}

        {status==='error'&&(
          <div style={{textAlign:'center',padding:'20px 0'}}>
            <div style={{fontSize:13,color:'#c0392b',marginBottom:20}}>{errMsg}</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              <button onClick={onClose} style={{padding:12,borderRadius:8,fontSize:14,fontWeight:500,border:'none',cursor:'pointer',background:'#f2f2ef',color:'#6b6b67'}}>閉じる</button>
              <button onClick={()=>setStatus('idle')} style={{padding:12,borderRadius:8,fontSize:14,fontWeight:500,border:'none',cursor:'pointer',background:AC,color:'#fff'}}>もう一度</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function PhModal({events,state,setState,onClose}){
  const ev=events.find(e=>e.id===state.eid);
  const photos=ev?(ev.photos||(ev.photo?[ev.photo]:[])):[];
  if(!photos.length)return null;
  const nav=d=>{setState(p=>({...p,i:(p.i+d+photos.length)%photos.length}));};
  return(
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.92)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:500,cursor:'pointer'}}>
      {photos.length>1&&<button onClick={e=>{e.stopPropagation();nav(-1);}} style={{position:'absolute',left:10,background:'rgba(255,255,255,.15)',color:'#fff',fontSize:26,padding:'6px 12px',borderRadius:8,border:'none',cursor:'pointer',zIndex:1}}>‹</button>}
      <img src={photos[state.i]} style={{maxWidth:'95vw',maxHeight:'90vh',objectFit:'contain',borderRadius:8}}/>
      {photos.length>1&&<button onClick={e=>{e.stopPropagation();nav(1);}} style={{position:'absolute',right:10,background:'rgba(255,255,255,.15)',color:'#fff',fontSize:26,padding:'6px 12px',borderRadius:8,border:'none',cursor:'pointer',zIndex:1}}>›</button>}
      {photos.length>1&&<div style={{position:'absolute',bottom:16,left:'50%',transform:'translateX(-50%)',color:'rgba(255,255,255,.7)',fontSize:12}}>{state.i+1} / {photos.length}</div>}
    </div>
  );
}
