<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="家族カレンダー">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>家族カレンダー</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useCallback, useEffect } = React;



// 日本の祝日データ（固定祝日 + ハッピーマンデー計算）
function getJapaneseHolidays(year) {
  const holidays = {};
  const add = (m, d, name) => { holidays[`${year}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`] = name; };

  // 固定祝日
  add(1,1,'元日');
  add(2,11,'建国記念の日');
  add(2,23,'天皇誕生日');
  add(4,29,'昭和の日');
  add(5,3,'憲法記念日');
  add(5,4,'みどりの日');
  add(5,5,'こどもの日');
  add(8,11,'山の日');
  add(11,3,'文化の日');
  add(11,23,'勤労感謝の日');

  // ハッピーマンデー
  const nthMonday = (m, n) => {
    let d = new Date(year, m-1, 1);
    let count = 0;
    while(true) { if(d.getDay()===1) { count++; if(count===n) return d.getDate(); } d.setDate(d.getDate()+1); }
  };
  add(1, nthMonday(1,2), '成人の日');
  add(7, nthMonday(7,3), '海の日');
  add(9, nthMonday(9,3), '敬老の日');
  add(10, nthMonday(10,2), 'スポーツの日');

  // 春分の日（簡易計算）
  const shunbun = Math.floor(20.8431 + 0.242194*(year-1980) - Math.floor((year-1980)/4));
  add(3, shunbun, '春分の日');

  // 秋分の日（簡易計算）
  const shubun = Math.floor(23.2488 + 0.242194*(year-1980) - Math.floor((year-1980)/4));
  add(9, shubun, '秋分の日');

  // 振替休日の計算
  const keys = Object.keys(holidays).sort();
  keys.forEach(key => {
    const d = new Date(key+'T12:00:00');
    if(d.getDay()===0) { // 日曜なら翌日が振替
      const next = new Date(d); next.setDate(next.getDate()+1);
      const nextKey = `${next.getFullYear()}-${String(next.getMonth()+1).padStart(2,'0')}-${String(next.getDate()).padStart(2,'0')}`;
      if(!holidays[nextKey]) holidays[nextKey] = '振替休日';
    }
  });

  // 国民の休日（祝日に挟まれた平日）
  const allKeys = Object.keys(holidays).sort();
  allKeys.forEach(key => {
    const d = new Date(key+'T12:00:00');
    const prev = new Date(d); prev.setDate(prev.getDate()-1);
    const next2 = new Date(d); next2.setDate(next2.getDate()+1);
    const fmt = x => `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`;
    if(holidays[fmt(prev)] && holidays[fmt(next2)] && !holidays[key]) {
      if(d.getDay()!==0) holidays[key] = '国民の休日';
    }
  });

  return holidays;
}

// 祝日キャッシュ
const holidayCache = {};
function getHoliday(dateStr) {
  const year = parseInt(dateStr.slice(0,4));
  if(!holidayCache[year]) holidayCache[year] = getJapaneseHolidays(year);
  return holidayCache[year][dateStr] || null;
}

const COLORS = ['#2d6a4f','#e67e22','#2980b9','#c0392b','#8e44ad'];
const SK = 'fc_ev1';
const AC = '#2d6a4f';
const ACL = '#e8f4ee';
const WEEKDAYS = ['日','月','火','水','木','金','土'];
const RECURRENCE_LABELS = { none:'なし', weekly:'毎週', monthly:'毎月', yearly:'毎年' };
const WEEK_H = 62;
const VISIBLE_WEEKS = 6;
const BUFFER_WEEKS = 6;
const TOTAL_WEEKS = VISIBLE_WEEKS + BUFFER_WEEKS * 2;

function loadEv() { try { return JSON.parse(localStorage.getItem(SK)||'[]'); } catch { return []; } }
function saveEv(l) { localStorage.setItem(SK, JSON.stringify(l)); }
function toDS(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function genId() { return 'e'+Math.random().toString(36).substr(2,8); }
function addDays(d, n) { const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function weekSunday(d) { const r=new Date(d); r.setDate(r.getDate()-r.getDay()); r.setHours(0,0,0,0); return r; }
function matchesRecurrence(ev, s) {
  const d=new Date(s+'T12:00:00'), o=new Date((ev.startDate||ev.date)+'T12:00:00');
  if(ev.recurrence==='weekly') return d.getDay()===o.getDay();
  if(ev.recurrence==='monthly') return d.getDate()===o.getDate();
  if(ev.recurrence==='yearly') return d.getMonth()===o.getMonth()&&d.getDate()===o.getDate();
  return false;
}
function onDate(ev, s) {
  const start=ev.startDate||ev.date;
  if(ev.recurrence&&ev.recurrence!=='none') return s>=start&&matchesRecurrence(ev,s);
  return start<=s&&s<=(ev.endDate||ev.date||start);
}
function resizeImg(file, cb) {
  const r=new FileReader(); r.onload=e=>{ const img=new Image(); img.onload=()=>{ const M=800,c=document.createElement('canvas'); let w=img.width,h=img.height; if(w>h&&w>M){h=h*M/w;w=M;}else if(h>M){w=w*M/h;h=M;} c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);cb(c.toDataURL('image/jpeg',.7));}; img.src=e.target.result;}; r.readAsDataURL(file);
}
function recurrenceLabel(ev) {
  if(!ev.recurrence||ev.recurrence==='none') return null;
  const o=new Date((ev.startDate||ev.date)+'T12:00:00');
  if(ev.recurrence==='weekly') return `毎週${WEEKDAYS[o.getDay()]}曜日`;
  if(ev.recurrence==='monthly') return `毎月${o.getDate()}日`;
  if(ev.recurrence==='yearly') return `毎年${o.getMonth()+1}月${o.getDate()}日`;
}

function App() {
  const [events, setEvents] = useState(loadEv);
  const [sel, setSel] = useState(() => new Date());
  const [modal, setModal] = useState(null); // 'add' | 'edit'
  const [editEv, setEditEv] = useState(null);
  const [phState, setPhState] = useState({eid:null,i:0});
  const [viewMode, setViewMode] = useState('calendar'); // 'calendar' | 'list'
  const changeViewMode = (mode) => {
    setViewMode(mode);
    // スクロール位置とズームをリセット
    window.scrollTo(0, 0);
    document.documentElement.style.transform = '';
  };
  const [dailyKey, setDailyKey] = useState(0); // デイリービュー強制更新用
  const [moveTarget, setMoveTarget] = useState(null); // {ev, newDate}
  const [toast, setToast] = useState(null);
  const tmr = useRef(null);

  const todayStr = toDS(new Date());
  const selStr = toDS(sel);

  const [anchorWeek, setAnchorWeek] = useState(() => {
    const t=new Date(); return addDays(weekSunday(new Date(t.getFullYear(),t.getMonth(),1)),-BUFFER_WEEKS*7);
  });
  const [translateY, setTranslateY] = useState(-(BUFFER_WEEKS*WEEK_H));
  const isCalDrag = useRef(false);
  const calStartY = useRef(0);
  const calStartTY = useRef(0);
  const calLastY = useRef(0);
  const calLastT = useRef(0);
  const calVel = useRef(0);
  const rafId = useRef(null);
  const containerRef = useRef(null);


  const showToast = useCallback((msg) => {
    setToast(msg); clearTimeout(tmr.current);
    tmr.current = setTimeout(()=>setToast(null), 2200);
  }, []);

  const addEv = useCallback((ev) => {
    const next=[...events,{...ev,id:genId()}]; setEvents(next); saveEv(next); showToast('追加しました');
  }, [events, showToast]);

  const updateEv = useCallback((id, data) => {
    const next=events.map(e=>e.id===id?{...e,...data}:e); setEvents(next); saveEv(next); showToast('更新しました');
  }, [events, showToast]);

  const delEv = useCallback((id) => {
    const next=events.filter(e=>e.id!==id); setEvents(next); saveEv(next); showToast('削除しました');
  }, [events, showToast]);

  const moveEv = useCallback((id, newDate) => {
    setEvents(prev => {
      const ev = prev.find(e => e.id === id);
      if (!ev) return prev;
      const durDays = ev.endDate && ev.startDate
        ? Math.round((new Date(ev.endDate+'T12:00:00') - new Date(ev.startDate+'T12:00:00')) / 86400000) : 0;
      const newEnd = durDays > 0 ? toDS(addDays(new Date(newDate+'T12:00:00'), durDays)) : newDate;
      const next = prev.map(e => e.id===id ? {...e, startDate:newDate, endDate:newEnd, date:newDate} : e);
      saveEv(next); return next;
    });
    showToast('移動しました ✓');
  }, [showToast]);



  const snapAndRecycle = (ty) => {
    const sn=Math.round(ty/WEEK_H)*WEEK_H;
    const tb=BUFFER_WEEKS+Math.round(sn/WEEK_H);
    if(tb<3){setAnchorWeek(p=>addDays(p,28));return sn+4*WEEK_H;}
    if(tb>TOTAL_WEEKS-VISIBLE_WEEKS-3){setAnchorWeek(p=>addDays(p,-28));return sn-4*WEEK_H;}
    return sn;
  };
  const snapRef = useRef(snapAndRecycle);
  snapRef.current = snapAndRecycle;

  const momentumFn = (v0) => {
    let v=v0;
    const step=()=>{ if(Math.abs(v)<0.5){setTranslateY(p=>snapRef.current(p));return;} v*=0.88; setTranslateY(p=>p+v); rafId.current=requestAnimationFrame(step); };
    rafId.current=requestAnimationFrame(step);
  };
  const momentumRef = useRef(momentumFn);
  momentumRef.current = momentumFn;

  const animateTo = (from,to) => {
    cancelAnimationFrame(rafId.current); let pos=from;
    const step=()=>{ const d=to-pos; if(Math.abs(d)<0.8){setTranslateY(snapRef.current(to));return;} pos+=d*0.2; setTranslateY(pos); rafId.current=requestAnimationFrame(step); };
    rafId.current=requestAnimationFrame(step);
  };

  // カレンダータッチ - 全てrefで最新値を参照、useEffectで毎回再登録
  const calStateRef = useRef({});
  calStateRef.current = { translateY, anchorWeek, setSel, setViewMode, setDailyKey, selStr };

  useEffect(()=>{
    const el = containerRef.current; if(!el) return;
    let startX=0, startY=0, startTY=0, startTime=0, lastY=0, lastT=0, vel=0, dragging=false;

    const onTS = (e) => {
      e.preventDefault();
      cancelAnimationFrame(rafId.current);
      dragging = true;
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      startTY = calStateRef.current.translateY || 0;
      lastY = startY; lastT = Date.now(); vel = 0;
    };
    const onTM = (e) => {
      if(!dragging) return; e.preventDefault();
      const y = e.touches[0].clientY;
      const now = Date.now(), dt = now - lastT;
      if(dt>0) vel = (y-lastY)/dt*16;
      lastY=y; lastT=now;
      setTranslateY(startTY + (y - startY));
    };
    const onTE = (e) => {
      if(!dragging) return; e.preventDefault(); dragging=false;
      const dx = Math.abs(e.changedTouches[0].clientX - startX);
      const dy = Math.abs(e.changedTouches[0].clientY - startY);
      const { translateY:ty, anchorWeek:aw, setSel:ss, setViewMode:svm } = calStateRef.current;
      const mom = momentumRef.current;
      const snap = snapRef.current;
      if(dx<10&&dy<10){
        const x = e.changedTouches[0].clientX, y = e.changedTouches[0].clientY;
        const rect = el.getBoundingClientRect();
        const weekIdx = Math.floor((y - rect.top - ty) / WEEK_H);
        const dayIdx = Math.floor((x - rect.left) / (rect.width / 7));
        if(weekIdx>=0 && weekIdx<TOTAL_WEEKS && dayIdx>=0 && dayIdx<7){
          const clicked = addDays(addDays(aw, weekIdx*7), dayIdx);
          const clickedStr = toDS(clicked);
          // 現在のselStrと比較
          const currentSelStr = calStateRef.current.selStr;
          if(clickedStr === currentSelStr){
            // 同じ日を2回タップ → デイリーへ
            svm('daily');
            calStateRef.current.setDailyKey(k=>k+1);
          } else {
            // 初回タップ → 日付選択のみ
            ss(clicked);
          }
        }
        setTranslateY(p=>snap(p));
        return;
      }
      Math.abs(vel)>2 ? mom(vel) : setTranslateY(p=>snap(p));
    };

    el.addEventListener('touchstart', onTS, {passive:false});
    el.addEventListener('touchmove', onTM, {passive:false});
    el.addEventListener('touchend', onTE, {passive:false});
    return()=>{
      el.removeEventListener('touchstart', onTS);
      el.removeEventListener('touchmove', onTM);
      el.removeEventListener('touchend', onTE);
    };
  }, [viewMode]); // viewModeが変わるたびに再登録（daily→calendarに戻ったとき対応）

  const topWeekIndex=-Math.round(translateY/WEEK_H);
  const midWeek=addDays(addDays(anchorWeek,topWeekIndex*7),3*7);
  const dispYear=midWeek.getFullYear(), dispMonth=midWeek.getMonth();

  const goToday=()=>{
    cancelAnimationFrame(rafId.current);
    const t=new Date();
    setAnchorWeek(addDays(weekSunday(new Date(t.getFullYear(),t.getMonth(),1)),-BUFFER_WEEKS*7));
    setTranslateY(-(BUFFER_WEEKS*WEEK_H)); setSel(t);
  };

  const allWeeks=[];
  for(let i=0;i<TOTAL_WEEKS;i++) allWeeks.push([0,1,2,3,4,5,6].map(d=>addDays(addDays(anchorWeek,i*7),d)));
  const dayEvs=events.filter(e=>onDate(e,selStr)).sort((a,b)=>(a.time||'99').localeCompare(b.time||'99'));

  return(
    <div style={{fontFamily:'-apple-system,Hiragino Sans,sans-serif',background:'#f7f7f5',color:'#1a1a18',maxWidth:480,margin:'0 auto',minHeight:'100vh',position:'relative',overflow:'hidden'}}>
      <div style={{background:'#fff',borderBottom:'1px solid #e8e8e4',padding:'13px 16px',position:'sticky',top:0,zIndex:100,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span style={{fontSize:15,fontWeight:600}}>📅 家族カレンダー</span>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          {viewMode==='daily'&&(
            <button onClick={()=>changeViewMode('calendar')} style={{background:'#f2f2ef',border:'none',borderRadius:8,padding:'5px 10px',fontSize:12,color:'#6b6b67',cursor:'pointer',fontWeight:500}}>← カレンダー</button>
          )}
          {viewMode!=='daily'&&(
            <button onClick={()=>changeViewMode(viewMode==='calendar'?'list':'calendar')} style={{background:viewMode==='list'?'#2d6a4f':'#f2f2ef',border:'none',borderRadius:8,padding:'5px 10px',fontSize:12,color:viewMode==='list'?'#fff':'#6b6b67',cursor:'pointer',fontWeight:500}}>
              {viewMode==='calendar'?'リスト':'カレンダー'}
            </button>
          )}
          {viewMode==='calendar'&&<button onClick={goToday} style={{background:'#f2f2ef',border:'none',borderRadius:8,padding:'5px 10px',fontSize:12,color:'#6b6b67',cursor:'pointer',fontWeight:500}}>今日</button>}
        </div>
      </div>
      {viewMode==='daily' ? (
        <DailyView
          key={dailyKey}
          sel={sel}
          events={events}
          todayStr={todayStr}
          onEdit={(ev)=>{setEditEv(ev);setModal('edit');}}
          onMoveStart={(ev)=>setMoveTarget(ev)}
          onDel={delEv}
          onPhoto={(eid,i)=>{setPhState({eid,i});setModal('photo');}}
        />
      ) : viewMode==='list' ? (
        <ListView events={events} todayStr={todayStr} onEdit={(ev)=>{setEditEv(ev);setModal('edit');}}/>
      ) : (<>
      <div style={{background:'#fff',padding:'10px 16px 6px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <button onClick={()=>{cancelAnimationFrame(rafId.current);const s=snapRef.current,ty=calStateRef.current.translateY;animateTo(ty,s(ty-4*WEEK_H));}} style={{background:'#f2f2ef',border:'none',borderRadius:8,padding:'5px 12px',fontSize:16,color:'#6b6b67',cursor:'pointer'}}>‹</button>
        <span style={{fontSize:16,fontWeight:600}}>{dispYear}年{dispMonth+1}月</span>
        <button onClick={()=>{cancelAnimationFrame(rafId.current);const s=snapRef.current,ty=calStateRef.current.translateY;animateTo(ty,s(ty+4*WEEK_H));}} style={{background:'#f2f2ef',border:'none',borderRadius:8,padding:'5px 12px',fontSize:16,color:'#6b6b67',cursor:'pointer'}}>›</button>
      </div>
      <div style={{background:'#fff',display:'grid',gridTemplateColumns:'repeat(7,1fr)',textAlign:'center',padding:'4px 6px',borderBottom:'1px solid #e8e8e4',width:'100%',boxSizing:'border-box'}}>
        {WEEKDAYS.map((d,i)=><span key={d} style={{fontSize:10,fontWeight:500,color:i===0?'#c0392b':i===6?'#2980b9':'#a8a8a4'}}>{d}</span>)}
      </div>
      <div ref={containerRef} style={{background:'#fff',height:WEEK_H*VISIBLE_WEEKS,overflow:'hidden',userSelect:'none',touchAction:'none',width:'100%',boxSizing:'border-box'}}>
        <div style={{transform:`translateY(${translateY}px)`,willChange:'transform'}}>
          {allWeeks.map((week,wi)=>(
            <WeekRow key={wi} week={week} selStr={selStr} todayStr={todayStr} events={events}
              onSelect={setSel}
              onEditEv={ev=>{setEditEv(ev);setModal('edit');}}
              dispMonth={dispMonth} height={WEEK_H}
              onGoDaily={(d)=>{
                setSel(d);
                setViewMode('daily');
                setDailyKey(k=>k+1);
              }}
            />
          ))}
        </div>
      </div>

      <div style={{background:'#fff',marginTop:6,padding:'16px 14px 90px',borderTop:'1px solid #e8e8e4',touchAction:'pan-y',boxSizing:'border-box',width:'100%',overflowX:'hidden'}}>
        <div style={{marginBottom:12}}>
          <div style={{fontSize:10,fontWeight:600,color:'#6b6b67',letterSpacing:0.5,textTransform:'uppercase'}}>
            {selStr===todayStr?`今日（${sel.getMonth()+1}月${sel.getDate()}日）の予定`:`${sel.getMonth()+1}月${sel.getDate()}日の予定`}
          </div>
          {getHoliday(selStr)&&<div style={{fontSize:11,color:'#c0392b',fontWeight:500,marginTop:3}}>🎌 {getHoliday(selStr)}</div>}
        </div>
        {dayEvs.length===0
          ?<div style={{color:'#a8a8a4',fontSize:12,textAlign:'center',padding:'20px 0'}}>予定はありません</div>
          :dayEvs.map(ev=>(
            <EvCard key={ev.id} ev={ev}
              onTap={()=>{setEditEv(ev);setModal('edit');}}
              onDel={delEv}
              onPhoto={(eid,i)=>{setPhState({eid,i});setModal('photo');}}
              onMoveStart={(ev)=>setMoveTarget(ev)}
            />
          ))
        }
      </div>

      </>)}
      <div style={{position:'fixed',bottom:24,right:20,zIndex:200}}>
        <button onClick={()=>setModal('add')} style={{width:50,height:50,borderRadius:'50%',background:AC,color:'#fff',border:'none',fontSize:26,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 4px 16px rgba(45,106,79,.35)'}}>＋</button>
      </div>


      {moveTarget&&(
        <MoveModal
          ev={moveTarget}
          onMove={(newDate)=>{ moveEv(moveTarget.id, newDate); setMoveTarget(null); }}
          onClose={()=>setMoveTarget(null)}
        />
      )}
      {modal==='add'&&<EventModal sel={sel} onSave={ev=>{addEv(ev);setModal(null);}} onClose={()=>setModal(null)}/>}
      {modal==='edit'&&editEv&&<EventModal sel={sel} initial={editEv} onSave={data=>{updateEv(editEv.id,data);setModal(null);setEditEv(null);}} onClose={()=>{setModal(null);setEditEv(null);}} onDel={()=>{delEv(editEv.id);setModal(null);setEditEv(null);}}/>}
      {modal==='photo'&&<PhModal events={events} state={phState} setState={setPhState} onClose={()=>setModal(null)}/>}
      {toast&&<div style={{position:'fixed',bottom:88,left:'50%',transform:'translateX(-50%)',background:'#1a1a18',color:'#fff',padding:'9px 18px',borderRadius:20,fontSize:12,fontWeight:500,zIndex:400,whiteSpace:'nowrap'}}>{toast}</div>}
    </div>
  );
}

function WeekRow({week,selStr,todayStr,events,onSelect,onEditEv,dispMonth,height,onGoDaily}){
  const ws=toDS(week[0]),we=toDS(week[6]);
  const normalEvs=events.filter(ev=>{if(ev.recurrence&&ev.recurrence!=='none')return false;const a=ev.startDate||ev.date,b=ev.endDate||ev.date||a;return a<=we&&b>=ws;});
  const recurEvs=events.filter(ev=>{if(!ev.recurrence||ev.recurrence==='none')return false;return week.some(c=>onDate(ev,toDS(c)));});
  const expanded=[];
  recurEvs.forEach(ev=>week.forEach(c=>{const ds2=toDS(c);if(onDate(ev,ds2))expanded.push({...ev,startDate:ds2,endDate:ds2,_recur:true});}));
  const allEvs=[...normalEvs,...expanded].sort((a,b)=>{const as2=a.startDate||a.date,bs2=b.startDate||b.date,al=new Date(a.endDate||a.date||as2)-new Date(as2),bl=new Date(b.endDate||b.date||bs2)-new Date(bs2);return as2.localeCompare(bs2)||bl-al;});
  const lanes=[];
  allEvs.forEach(ev=>{const es=ev.startDate||ev.date,ee=ev.endDate||ev.date||es;let li=0;for(;;){if(!lanes[li])lanes[li]=[];if(!lanes[li].some(o=>{const os=o.startDate||o.date,oe=o.endDate||o.date||os;return es<=oe&&ee>=os;})){lanes[li].push(ev);break;}li++;}});
  return(
    <div style={{height,display:'flex',flexDirection:'column',paddingTop:2,borderBottom:'1px solid #f2f2ef',overflow:'hidden'}}>

          const holiday=getHoliday(d2);

          const col=idx===0||isHoliday?'#c0392b':idx===6?'#2980b9':'#1a1a18';
          return(
            <div key={idx} data-date={d2} onClick={()=>onSelect(cell)} style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'2px 1px',cursor:'pointer',borderRadius:6,background:isSel&&!isT?ACL:'transparent'}}>

            </div>
          );

        <div style={{display:'flex',flexDirection:'column',gap:1,padding:'1px 4px 0'}}>
          {lanes.slice(0,3).map((lane,li)=>{
            const used=new Set(),bars=[];
            lane.slice().sort((a,b)=>(a.startDate||a.date).localeCompare(b.startDate||b.date)).forEach(ev=>{
              const es=ev.startDate||ev.date,ee=ev.endDate||ev.date||es;let cs=-1,ce=-1;
              week.forEach((c,i)=>{const s2=toDS(c);if(s2>=es&&s2<=ee){if(cs<0)cs=i;ce=i;}});
              if(cs<0)return;for(let i=cs;i<=ce;i++)used.add(i);
              const rL=es===toDS(week[cs]),rR=ee===toDS(week[ce]);
              const br=rL&&rR?'4px':rL?'4px 0 0 4px':rR?'0 4px 4px 0':'0';
              bars.push(<div key={ev.id+es} data-date={toDS(week[cs])} onClick={e=>{e.stopPropagation();if(onGoDaily){onGoDaily(week[cs]);}else{onSelect(week[cs]);}}} style={{height:10,lineHeight:'10px',fontSize:8,color:'#fff',padding:'0 3px',overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis',cursor:'pointer',alignSelf:'center',background:ev.color||AC,gridColumn:`${cs+1}/${ce+2}`,borderRadius:br,marginLeft:rL?1:0,marginRight:rR?1:0,fontWeight:500,opacity:ev._recur?.85:1}}>{(rL||cs===0)?(ev._recur?'🔁 '+ev.title:ev.title):''}</div>);
            });
            week.forEach((_,i)=>{if(!used.has(i))bars.push(<div key={'p'+li+i} style={{gridColumn:i+1}}/>);});
            return <div key={li} style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',height:11}}>{bars}</div>;
          })}

        </div>
      )}
    </div>
  );
}

function ListView({events, todayStr, onEdit}) {
  // 今日以降の予定を日付順に並べる
  const sorted = [...events]
    .filter(ev => {
      const d = ev.startDate || ev.date;
      return d >= todayStr;
    })
    .sort((a, b) => {
      const da = a.startDate || a.date;
      const db = b.startDate || b.date;
      if (da !== db) return da.localeCompare(db);
      return (a.time || '99:99').localeCompare(b.time || '99:99');
    });

  // 日付ごとにグループ化
  const grouped = {};
  sorted.forEach(ev => {
    const d = ev.startDate || ev.date;
    if (!grouped[d]) grouped[d] = [];
    grouped[d].push(ev);
  });

  // 繰り返し予定を今後30日分展開
  const today = new Date(todayStr + 'T12:00:00');
  events.filter(ev => ev.recurrence && ev.recurrence !== 'none').forEach(ev => {
    for (let i = 0; i <= 30; i++) {
      const d = new Date(today); d.setDate(d.getDate() + i);
      const ds = toDS(d);
      if (ds < (ev.startDate || ev.date)) continue;
      if (matchesRecurrence(ev, ds)) {
        if (!grouped[ds]) grouped[ds] = [];
        if (!grouped[ds].find(e => e.id === ev.id)) {
          grouped[ds].push({...ev, _displayDate: ds});
        }
      }
    }
  });

  const days = Object.keys(grouped).sort();

  const fmtDay = (ds) => {
    const d = new Date(ds + 'T12:00:00');
    const weekdays = ['日','月','火','水','木','金','土'];
    const m = d.getMonth() + 1, day = d.getDate(), w = weekdays[d.getDay()];
    const isToday = ds === todayStr;
    return `${m}月${day}日（${w}）${isToday ? ' 今日' : ''}`;
  };

  if (days.length === 0) {
    return (
      <div style={{background:'#fff',marginTop:6,padding:'40px 16px',textAlign:'center',color:'#a8a8a4',fontSize:13}}>
        今後の予定はありません
      </div>
    );
  }

  return (
    <div style={{background:'#f7f7f5',minHeight:'60vh',paddingBottom:90}}>
      {days.map(ds => (
        <div key={ds}>
          <div style={{padding:'14px 16px 6px',background:'#f7f7f5'}}>
            <span style={{fontSize:13,fontWeight:600,color: ds===todayStr?'#2d6a4f':'#6b6b67'}}>{fmtDay(ds)}</span>
          </div>
          <div style={{background:'#fff',borderTop:'1px solid #e8e8e4',borderBottom:'1px solid #e8e8e4'}}>
            {grouped[ds].map((ev, idx) => {
              const recurLbl = recurrenceLabel(ev);
              return (
                <div key={ev.id + ds} onClick={()=>onEdit(ev)}
                  style={{display:'flex',alignItems:'stretch',padding:'12px 16px',borderBottom:idx<grouped[ds].length-1?'1px solid #f2f2ef':'none',cursor:'pointer',gap:12}}>
                  <div style={{width:3,borderRadius:2,background:ev.color||'#2d6a4f',flexShrink:0}}/>
                  <div style={{flex:1}}>
                    <div style={{fontSize:15,fontWeight:500,color:'#1a1a18'}}>{ev.title}</div>
                    {ev.time && <div style={{fontSize:12,color:'#6b6b67',marginTop:2}}>{ev.time}</div>}
                    {recurLbl && <div style={{fontSize:11,color:'#a8a8a4',marginTop:2}}>🔁 {recurLbl}</div>}
                    {ev.memo && <div style={{fontSize:12,color:'#a8a8a4',marginTop:2}}>{ev.memo}</div>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

  const nav=d=>{setState(p=>({...p,i:(p.i+d+photos.length)%photos.length}));};
  return(
    <div onClick={onClose} style={{position:'fixed',left:0,top:0,width:'100vw',height:'100vh',background:'rgba(0,0,0,.92)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:500,cursor:'pointer'}}>
      {photos.length>1&&<button onClick={e=>{e.stopPropagation();nav(-1);}} style={{position:'absolute',left:10,background:'rgba(255,255,255,.15)',color:'#fff',fontSize:26,padding:'6px 12px',borderRadius:8,border:'none',cursor:'pointer',zIndex:1}}>‹</button>}
      <img src={photos[state.i]} style={{maxWidth:'95vw',maxHeight:'90vh',objectFit:'contain',borderRadius:8}}/>
      {photos.length>1&&<button onClick={e=>{e.stopPropagation();nav(1);}} style={{position:'absolute',right:10,background:'rgba(255,255,255,.15)',color:'#fff',fontSize:26,padding:'6px 12px',borderRadius:8,border:'none',cursor:'pointer',zIndex:1}}>›</button>}
      {photos.length>1&&<div style={{position:'absolute',bottom:16,left:'50%',transform:'translateX(-50%)',color:'rgba(255,255,255,.7)',fontSize:12}}>{state.i+1} / {photos.length}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
