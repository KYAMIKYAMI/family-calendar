<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="家族カレンダー">
<title>家族カレンダー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,Hiragino Sans,sans-serif;background:#f7f7f5;color:#1a1a18;}
input,select,textarea,button{font-family:inherit;font-size:16px;}
</style>
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
<div id="app"></div>
<script>
// ========== データ ==========
var SK = 'fc_ev1';
var CAL_SK = 'fc_cals';
var DEFAULT_CALS = [
  {id:'work', name:'仕事', color:'#2980b9', visible:true},
  {id:'private', name:'いっちゃん', color:'#2d6a4f', visible:true},
  {id:'kyami', name:'キャミー', color:'#e67e22', visible:true},
  {id:'yui', name:'唯', color:'#8e44ad', visible:true},
];
function loadCals(){
  try{
    var saved=JSON.parse(localStorage.getItem(CAL_SK));
    if(!saved)return DEFAULT_CALS;
    // 新しいデフォルトカレンダーを追加（既存は保持）
    DEFAULT_CALS.forEach(function(dc){
      if(!saved.find(function(s){return s.id===dc.id;})){
        saved.push(dc);
      }
    });
    return saved;
  }catch(e){return DEFAULT_CALS;}
}
function saveCals(cals){
  try{localStorage.setItem(CAL_SK,JSON.stringify(cals));}catch(e){}
}
var AC = '#2d6a4f';
var ACL = '#e8f5ee';
var COLORS = ['#2d6a4f','#e67e22','#2980b9','#c0392b','#8e44ad'];
var WEEK_H = 76;
var VISIBLE_WEEKS = 6;

function toDS(d){
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function pad(n){return String(n).padStart(2,'0');}
function addDays(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r;}
function parseDS(s){return new Date(s+'T12:00:00');}

function loadEvents(){
  try{return JSON.parse(localStorage.getItem(SK)||'[]');}catch(e){return [];}
}
function saveEvents(evs){
  try{
    localStorage.setItem(SK,JSON.stringify(evs));
  }catch(e){
    // 容量オーバーの場合、写真を除いて保存を試みる
    try{
      var slim=evs.map(function(ev){
        return Object.assign({},ev,{photos:[]});
      });
      localStorage.setItem(SK,JSON.stringify(slim));
      alert('写真データが大きすぎるため写真なしで保存しました。写真は1枚ずつ追加してください。');
    }catch(e2){
      alert('保存できませんでした: '+e2.message);
    }
  }
}

// ========== 祝日 ==========
var holidayCache={};
function getHolidays(year){
  if(holidayCache[year])return holidayCache[year];
  var h={};
  function add(m,d,name){h[year+'-'+pad(m)+'-'+pad(d)]=name;}
  add(1,1,'元日');add(2,11,'建国記念の日');add(2,23,'天皇誕生日');
  add(4,29,'昭和の日');add(5,3,'憲法記念日');add(5,4,'みどりの日');
  add(5,5,'こどもの日');add(8,11,'山の日');add(11,3,'文化の日');add(11,23,'勤労感謝の日');
  function nthMon(m,n){var d=new Date(year,m-1,1),c=0;while(true){if(d.getDay()===1){c++;if(c===n)return d.getDate();}d.setDate(d.getDate()+1);}}
  add(1,nthMon(1,2),'成人の日');add(7,nthMon(7,3),'海の日');
  add(9,nthMon(9,3),'敬老の日');add(10,nthMon(10,2),'スポーツの日');
  var sp=Math.floor(20.8431+0.242194*(year-1980)-Math.floor((year-1980)/4));
  var sa=Math.floor(23.2488+0.242194*(year-1980)-Math.floor((year-1980)/4));
  add(3,sp,'春分の日');add(9,sa,'秋分の日');
  var keys=Object.keys(h).sort();
  keys.forEach(function(k){
    var d=parseDS(k);
    if(d.getDay()===0){
      var nx=addDays(d,1),nk=toDS(nx);
      if(!h[nk])h[nk]='振替休日';
    }
  });
  holidayCache[year]=h;
  return h;
}
function getHoliday(ds){
  var y=parseInt(ds.slice(0,4));
  return getHolidays(y)[ds]||null;
}

// ========== 状態 ==========
var state={
  events: loadEvents(),
  cals: loadCals(),
  sel: new Date(),
  viewMode: 'calendar', // calendar|daily|list
  modal: null, // null|add|edit|move
  editEv: null,
  moveEv: null,
  anchorWeek: null,
  translateY: 0,
  dispMonth: new Date().getMonth(),
  dispYear: new Date().getFullYear(),
  dailyKey: 0,
};

// anchorWeekを今週の日曜に設定
(function(){
  var t=new Date(); t.setHours(0,0,0,0);
  var dow=t.getDay();
  var sun=addDays(t,-dow);
  var buf=4;
  state.anchorWeek=addDays(sun,-buf*7);
  state.translateY=-(buf*WEEK_H);
})();

var todayStr=toDS(new Date());

// ========== レンダリング ==========
function render(){
  var app=document.getElementById('app');
  app.innerHTML='';
  var wrap=el('div',{style:'font-family:-apple-system,Hiragino Sans,sans-serif;background:#f7f7f5;min-height:100vh;max-width:480px;margin:0 auto;'});
  app.appendChild(wrap);
  renderHeader(wrap);
  if(state.viewMode==='daily'){
    renderDaily(wrap);
  } else if(state.viewMode==='list'){
    renderList(wrap);
  } else {
    renderCalendar(wrap);
    renderDayEvents(wrap);
  }
  renderFAB(wrap);
  if(state.modal==='add'||state.modal==='edit') renderEventModal(wrap);
  if(state.modal==='move') renderMoveModal(wrap);
  if(state.modal==='reminder') renderReminderModal(wrap);
}

function el(tag,attrs,children){
  var e=document.createElement(tag);
  if(attrs){
    Object.keys(attrs).forEach(function(k){
      if(k==='style'&&typeof attrs[k]==='string') e.style.cssText=attrs[k];
      else if(k==='style'&&typeof attrs[k]==='object') Object.assign(e.style,attrs[k]);
      else if(k.startsWith('on')&&typeof attrs[k]==='function') e.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
      else e.setAttribute(k,attrs[k]);
    });
  }
  if(children){
    if(typeof children==='string') e.textContent=children;
    else if(Array.isArray(children)) children.forEach(function(c){if(c)e.appendChild(typeof c==='string'?document.createTextNode(c):c);});
    else e.appendChild(children);
  }
  return e;
}

function txt(s){return document.createTextNode(s);}

// ========== ヘッダー ==========
function renderHeader(wrap){
  var h=el('div',{style:'background:#fff;border-bottom:1px solid #e8e8e4;padding:8px 12px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;'});
  var left=el('span',{style:'font-size:13px;font-weight:600;'},'📅 家族カレンダー');
  var right=el('div',{style:'display:flex;gap:8px;align-items:center;'});
  if(state.viewMode==='daily'){
    var backBtn=el('button',{style:'background:#f2f2ef;border:none;border-radius:8px;padding:5px 10px;font-size:12px;color:#6b6b67;cursor:pointer;',onclick:function(){state.viewMode='calendar';render();}});
    backBtn.textContent='← カレンダー';
    right.appendChild(backBtn);
  } else {
    // カレンダーフィルターボタン
    state.cals.forEach(function(cal){
      var btn=el('button',{style:'background:'+(cal.visible?cal.color:'#f2f2ef')+';border:none;border-radius:8px;padding:3px 6px;font-size:10px;font-weight:600;color:'+(cal.visible?'#fff':'#a8a8a4')+';cursor:pointer;'});
      btn.textContent=cal.name;
      btn.addEventListener('click',function(){
        cal.visible=!cal.visible;
        saveCals(state.cals);
        render();
      });
      right.appendChild(btn);
    });
    var listBtn=el('button',{style:'background:'+(state.viewMode==='list'?AC:'#f2f2ef')+';border:none;border-radius:8px;padding:5px 10px;font-size:12px;color:'+(state.viewMode==='list'?'#fff':'#6b6b67')+';cursor:pointer;',onclick:function(){state.viewMode=state.viewMode==='list'?'calendar':'list';render();}});
    listBtn.textContent=state.viewMode==='list'?'カレンダー':'リスト';
    right.appendChild(listBtn);
    var todayBtn=el('button',{style:'background:#f2f2ef;border:none;border-radius:8px;padding:5px 10px;font-size:12px;color:#6b6b67;cursor:pointer;',onclick:function(){
      var t=new Date(); t.setHours(0,0,0,0);
      state.sel=t;
      var dow=t.getDay();
      var sun=addDays(t,-dow);
      var buf=4;
      state.anchorWeek=addDays(sun,-buf*7);
      state.translateY=-(buf*WEEK_H);
      state.viewMode='calendar';
      render();
    }});
    todayBtn.textContent='今日';
    right.appendChild(todayBtn);
  }
  h.appendChild(left);
  h.appendChild(right);
  wrap.appendChild(h);
}

// ========== カレンダー ==========
function renderCalendar(wrap){
  // 月ナビ
  var nav=el('div',{style:'background:#fff;padding:12px 16px 8px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid '+AC+';'});
  var prevBtn=el('button',{style:'background:#f2f2ef;border:none;border-radius:8px;padding:5px 12px;font-size:16px;color:#6b6b67;cursor:pointer;',onclick:function(){
    animateTo(state.translateY, snapY(state.translateY-4*WEEK_H));
  }});
  prevBtn.textContent='‹';
  var monthLbl=el('span',{style:'font-size:17px;font-weight:700;letter-spacing:0.5px;'},state.dispYear+'年'+(state.dispMonth+1)+'月');
  var nextBtn=el('button',{style:'background:#f2f2ef;border:none;border-radius:8px;padding:5px 12px;font-size:16px;color:#6b6b67;cursor:pointer;',onclick:function(){
    animateTo(state.translateY, snapY(state.translateY+4*WEEK_H));
  }});
  nextBtn.textContent='›';
  nav.appendChild(prevBtn);
  nav.appendChild(monthLbl);
  nav.appendChild(nextBtn);
  wrap.appendChild(nav);

  // 曜日ヘッダー
  var days=['日','月','火','水','木','金','土'];
  var dayHdr=el('div',{style:'background:#fff;display:grid;grid-template-columns:repeat(7,1fr);text-align:center;padding:2px 4px;border-bottom:1px solid #e8e8e4;width:100%;'});
  days.forEach(function(d,i){
    var c=i===0?'#c0392b':i===6?'#2980b9':'#6b6b67';
    dayHdr.appendChild(el('div',{style:'font-size:10px;font-weight:600;color:'+c+';padding:1px 0;'},d));
  });
  wrap.appendChild(dayHdr);

  // カレンダーグリッド
  var grid=el('div',{style:'background:#fff;height:'+(WEEK_H*VISIBLE_WEEKS)+'px;overflow:hidden;width:100%;position:relative;'});
  var inner=el('div',{id:'cal-inner',style:'position:absolute;top:0;left:0;width:100%;transform:translateY('+state.translateY+'px);will-change:transform;'});

  var totalWeeks=VISIBLE_WEEKS+8*2;
  for(var wi=0;wi<totalWeeks;wi++){
    inner.appendChild(renderWeekRow(wi));
  }
  grid.appendChild(inner);
  wrap.appendChild(grid);

  // タッチイベント
  setupCalTouch(grid, inner);
}

function renderWeekRow(wi){
  var row=el('div',{style:'display:flex;flex-direction:column;height:'+WEEK_H+'px;border-bottom:1px solid #f2f2ef;overflow:hidden;width:100%;'});
  var cells=el('div',{style:'display:grid;grid-template-columns:repeat(7,1fr);padding:0 4px;width:100%;'});
  var selStr=toDS(state.sel);

  for(var di=0;di<7;di++){
    var date=addDays(addDays(state.anchorWeek,wi*7),di);
    var ds=toDS(date);
    var isToday=ds===todayStr;
    var isSel=ds===selStr;
    var isOther=date.getMonth()!==state.dispMonth;
    var holiday=getHoliday(ds);
    var isHoliday=!!holiday;
    var col=di===0||isHoliday?'#c0392b':di===6?'#2980b9':'#1a1a18';
    if(isOther)col='#c8c8c4';

    var cell=el('div',{style:'display:flex;flex-direction:column;align-items:center;padding:2px 1px;cursor:pointer;border-radius:6px;background:'+(isSel&&!isToday?ACL:'transparent')+';'});
    cell.dataset.date=ds;
    cell.dataset.wi=wi;
    cell.dataset.di=di;

    var numSpan=el('span',{style:'font-size:11px;line-height:20px;pointer-events:none;color:'+(isToday?'#fff':col)+';background:'+(isToday?AC:'transparent')+';border-radius:50%;width:'+(isToday?'20px':'auto')+';height:'+(isToday?'20px':'auto')+';display:'+(isToday?'flex':'inline')+';align-items:center;justify-content:center;font-weight:'+(isToday?'600':'400')+';'});
    numSpan.textContent=date.getDate();
    cell.appendChild(numSpan);

    if(!isOther&&holiday){
      var hSpan=el('span',{style:'font-size:7px;color:#c0392b;line-height:1;text-align:center;width:100%;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;pointer-events:none;'},holiday);
      cell.appendChild(hSpan);
    }

    cells.appendChild(cell);
  }
  row.appendChild(cells);

  // 予定バー
  var barsArea=renderEventBars(wi);
  row.appendChild(barsArea);

  return row;
}

function renderEventBars(wi){
  var area=el('div',{style:'flex:1;overflow:hidden;padding:0 2px;'});
  var selStr=toDS(state.sel);
  var weekStart=addDays(state.anchorWeek,wi*7);
  var weekEnd=addDays(weekStart,6);
  var ws=toDS(weekStart), we=toDS(weekEnd);

  var dayEvs=state.events.filter(function(ev){
    var calId=ev.calId||'private';
    var cal=state.cals.find(function(c){return c.id===calId;});
    if(cal&&!cal.visible)return false;
    var a=ev.startDate||ev.date, b=ev.endDate||ev.date||a;
    return a<=we&&b>=ws&&(!ev.recurrence||ev.recurrence==='none');
  });

  // 繰り返し予定（1日単位で追加）
  state.events.filter(function(ev){return ev.recurrence&&ev.recurrence!=='none';}).forEach(function(ev){
    var calId=ev.calId||'private';
    var cal=state.cals.find(function(c){return c.id===calId;});
    if(cal&&!cal.visible)return;
    for(var i=0;i<7;i++){
      var d=addDays(weekStart,i);
      var ds=toDS(d);
      if(matchRecur(ev,ds)){
        dayEvs.push(Object.assign({},ev,{_recur:true,startDate:ds,endDate:ds}));
      }
    }
  });

  // ソート：終日（複数日）→時間なし→時間早い順
  dayEvs.sort(function(a,b){
    var aMulti=(a.startDate||a.date)!==(a.endDate||a.date||a.startDate);
    var bMulti=(b.startDate||b.date)!==(b.endDate||b.date||b.startDate);
    if(aMulti&&!bMulti) return -1;
    if(!aMulti&&bMulti) return 1;
    var at=a.time||''; var bt=b.time||'';
    if(!at&&bt) return -1;
    if(at&&!bt) return 1;
    return at.localeCompare(bt);
  });

  // レーン割り当て（最大3本）
  var lanes=[[],[],[],[]];
  dayEvs.forEach(function(ev){
    var a=ev.startDate||ev.date, b=ev.endDate||ev.date||a;
    // csとceを日数差で計算
    var aDate=parseDS(a), bDate=parseDS(b), wsDate=parseDS(ws);
    var cs=Math.round((aDate-wsDate)/86400000);
    var ce=Math.round((bDate-wsDate)/86400000);
    cs=Math.max(0,Math.min(6,cs));
    ce=Math.max(0,Math.min(6,ce));
    if(cs>ce)return; // この週に表示範囲なし
    var lane=-1;
    for(var l=0;l<4;l++){
      var ok=true;
      for(var x=0;x<lanes[l].length;x++){
        // 重なりチェック
        if(cs<=lanes[l][x].ce&&ce>=lanes[l][x].cs){ok=false;break;}
      }
      if(ok){lane=l;break;}
    }
    if(lane>=0){
      lanes[lane].push({ev:ev,cs:cs,ce:ce});
    }
  });

  for(var l=0;l<Math.min(4,lanes.length);l++){
    if(!lanes[l])continue;
    var laneEl=el('div',{style:'display:grid;grid-template-columns:repeat(7,1fr);height:11px;margin-bottom:1px;'});
    var used=new Set();
    lanes[l].forEach(function(item){
      var rL=item.cs===0&&parseDS(item.ev.startDate||item.ev.date)<parseDS(ws);
      var rR=item.ce===6&&parseDS(item.ev.endDate||item.ev.date||item.ev.startDate)>parseDS(we);
      var barStyle='height:10px;line-height:10px;font-size:8px;color:#fff;padding:0 3px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer;background:'+(item.ev.color||AC)+';grid-column:'+(item.cs+1)+'/'+(item.ce+2)+';border-radius:'+(rL?'0':'3px')+' '+(rR?'0':'3px')+' '+(rR?'0':'3px')+' '+(rL?'0':'3px')+';margin-left:'+(rL?'0':'1px')+';margin-right:'+(rR?'0':'1px')+';font-weight:500;opacity:'+(item.ev._recur?0.85:1)+';';
      var bar=el('div',{style:barStyle});
      bar.dataset.date=toDS(addDays(weekStart,item.cs));
      if(!rL||item.cs===0) bar.textContent=(item.ev._recur?'🔁 ':'')+item.ev.title;
      bar.addEventListener('click',function(e){
        e.stopPropagation();
        var ds=bar.dataset.date;
        state.sel=parseDS(ds);
        state.viewMode='daily';
        state.dailyKey++;
        render();
      });
      for(var x=item.cs;x<=item.ce;x++)used.add(x);
      laneEl.appendChild(bar);
    });
    area.appendChild(laneEl);
  }
  return area;
}

function matchRecur(ev,ds){
  var base=ev.startDate||ev.date;
  if(ds<base)return false;
  var bd=parseDS(base), td=parseDS(ds);
  if(ev.recurrence==='weekly') return bd.getDay()===td.getDay();
  if(ev.recurrence==='monthly') return bd.getDate()===td.getDate();
  if(ev.recurrence==='yearly') return bd.getDate()===td.getDate()&&bd.getMonth()===td.getMonth();
  return false;
}

// ========== タッチスクロール ==========
var calTouchState={startX:0,startY:0,startTY:0,lastY:0,lastT:0,vel:0,dragging:false,rafId:null};

function setupCalTouch(grid,inner){
  grid.addEventListener('touchstart',function(e){
    e.preventDefault();
    cancelAnimationFrame(calTouchState.rafId);
    calTouchState.dragging=true;
    calTouchState.startX=e.touches[0].clientX;
    calTouchState.startY=e.touches[0].clientY;
    calTouchState.startTY=state.translateY;
    calTouchState.lastY=e.touches[0].clientY;
    calTouchState.lastT=Date.now();
    calTouchState.vel=0;
  },{passive:false});

  grid.addEventListener('touchmove',function(e){
    if(!calTouchState.dragging)return;
    e.preventDefault();
    var y=e.touches[0].clientY;
    var now=Date.now(), dt=now-calTouchState.lastT;
    if(dt>0)calTouchState.vel=(y-calTouchState.lastY)/dt*16;
    calTouchState.lastY=y;
    calTouchState.lastT=now;
    state.translateY=calTouchState.startTY+(y-calTouchState.startY);
    inner.style.transform='translateY('+state.translateY+'px)';
  },{passive:false});

  grid.addEventListener('touchend',function(e){
    if(!calTouchState.dragging)return;
    e.preventDefault();
    calTouchState.dragging=false;
    var dx=Math.abs(e.changedTouches[0].clientX-calTouchState.startX);
    var dy=Math.abs(e.changedTouches[0].clientY-calTouchState.startY);
    if(dx<10&&dy<10){
      // タップ：座標から日付を計算
      var rect=grid.getBoundingClientRect();
      var x=e.changedTouches[0].clientX, y=e.changedTouches[0].clientY;
      var weekIdx=Math.floor((y-rect.top-state.translateY)/WEEK_H);
      var dayIdx=Math.floor((x-rect.left)/(rect.width/7));
      if(weekIdx>=0&&weekIdx<16+8&&dayIdx>=0&&dayIdx<7){
        var clicked=addDays(addDays(state.anchorWeek,weekIdx*7),dayIdx);
        var clickedStr=toDS(clicked);
        var curSelStr=toDS(state.sel);
        if(clickedStr===curSelStr){
          state.viewMode='daily';
          state.dailyKey++;
        } else {
          state.sel=clicked;
        }
        state.translateY=snapY(state.translateY);
        render();
        return;
      }
    }
    if(Math.abs(calTouchState.vel)>2){
      momentum(calTouchState.vel);
    } else {
      doSnap();
    }
  },{passive:false});
}

function snapY(ty){
  // まずスナップ位置を計算（副作用なし）
  var sn=Math.round(ty/WEEK_H)*WEEK_H;
  return sn;
}

function recycleIfNeeded(){
  // anchorWeekのリサイクル（snapY後に呼ぶ）
  var buf=4;
  var tb=buf+Math.round(state.translateY/WEEK_H);
  var total=VISIBLE_WEEKS+buf*2;
  if(tb<3){
    state.anchorWeek=addDays(state.anchorWeek,28);
    state.translateY+=4*WEEK_H;
    var inner=document.getElementById('cal-inner');
    if(inner)inner.style.transform='translateY('+state.translateY+'px)';
  } else if(tb>total-VISIBLE_WEEKS-3){
    state.anchorWeek=addDays(state.anchorWeek,-28);
    state.translateY-=4*WEEK_H;
    var inner=document.getElementById('cal-inner');
    if(inner)inner.style.transform='translateY('+state.translateY+'px)';
  }
}

function momentum(v){
  calTouchState.rafId=requestAnimationFrame(function(){
    v*=0.85;
    state.translateY+=v;
    var inner=document.getElementById('cal-inner');
    if(inner)inner.style.transform='translateY('+state.translateY+'px)';
    if(Math.abs(v)<1.5){
      // 速度が十分小さくなったらスナップ
      doSnap();
      return;
    }
    momentum(v);
  });
}

function doSnap(){
  var snapped=snapY(state.translateY);
  var from=state.translateY;
  function snapStep(){
    var d=snapped-from;
    if(Math.abs(d)<1){
      state.translateY=snapped;
      recycleIfNeeded();
      updateDispMonth();
      render();
      return;
    }
    from+=d*0.3;
    state.translateY=from;
    var inner=document.getElementById('cal-inner');
    if(inner)inner.style.transform='translateY('+state.translateY+'px)';
    calTouchState.rafId=requestAnimationFrame(snapStep);
  }
  snapStep();
}

function animateTo(from,to){
  cancelAnimationFrame(calTouchState.rafId);
  var pos=from;
  // innerを直接操作してスムーズアニメーション
  var inner=document.querySelector('#cal-inner');
  function step(){
    var d=to-pos;
    if(Math.abs(d)<0.5){
      state.translateY=to;
      updateDispMonth();
      render();
      return;
    }
    pos+=d*0.18;
    state.translateY=pos;
    if(inner) inner.style.transform='translateY('+pos+'px)';
    calTouchState.rafId=requestAnimationFrame(step);
  }
  step();
}

function updateDispMonth(){
  var buf=4;
  var topIdx=-Math.round(state.translateY/WEEK_H);
  var midWeek=addDays(addDays(state.anchorWeek,topIdx*7),3*7);
  state.dispMonth=midWeek.getMonth();
  state.dispYear=midWeek.getFullYear();
}

function getEventsForDate(ds){
  var result=[];
  state.events.forEach(function(ev){
    // 非表示カレンダーの予定を除外
    var calId=ev.calId||'private';
    var cal=state.cals.find(function(c){return c.id===calId;});
    if(cal&&!cal.visible)return;
    var a=ev.startDate||ev.date, b=ev.endDate||ev.date||a;
    if(!ev.recurrence||ev.recurrence==='none'){
      if(a<=ds&&ds<=b)result.push(ev);
    } else {
      if(matchRecur(ev,ds))result.push(ev);
    }
  });
  return result;
}

    btn.textContent=item[1];
    btn.addEventListener('click',function(){formState.recurrence=item[0];formState.init=false;render();});
    recurRow.appendChild(btn);
  });
  sheet.appendChild(recurRow);

  // メモ
  sheet.appendChild(lbl('メモ（任意）'));
  var memoInp=el('textarea',{placeholder:'メモ...',style:Object.assign(inp(),{height:'52px',resize:'none'})});
  memoInp.value=formState.memo;
  memoInp.addEventListener('input',function(){formState.memo=this.value;});
  sheet.appendChild(memoInp);

  // 色
  sheet.appendChild(lbl('色'));
  var colorRow=el('div',{style:'display:flex;gap:8px;margin-bottom:8px;'});
  COLORS.forEach(function(c){
    var btn=el('button',{style:'width:28px;height:28px;border-radius:50%;background:'+c+';border:3px solid '+(formState.color===c?'#1a1a18':'transparent')+';cursor:pointer;padding:0;'});
    btn.addEventListener('click',function(){formState.color=c;formState.init=false;render();});
    colorRow.appendChild(btn);
  });
  sheet.appendChild(colorRow);

  // 写真
  sheet.appendChild(lbl('写真（最大10枚）'));
  var photoArea=el('div',{style:'margin-bottom:8px;'});
  // 既存写真サムネイル
  if(formState.photos&&formState.photos.length>0){
    var thumbGrid=el('div',{style:'display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:6px;'});
    formState.photos.forEach(function(src,idx){
      var wrap=el('div',{style:'position:relative;aspect-ratio:1;'});
      var img=el('img',{src:src,style:'width:100%;height:100%;object-fit:cover;border-radius:6px;'});
      var del=el('button',{style:'position:absolute;top:2px;right:2px;background:rgba(0,0,0,.5);border:none;color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;cursor:pointer;padding:0;line-height:1;'});
      del.textContent='×';
      (function(i){
        del.addEventListener('click',function(e){
          e.stopPropagation();
          formState.photos.splice(i,1);
          formState.init=false;
          render();
        });
      })(idx);
      wrap.appendChild(img);
      wrap.appendChild(del);
      thumbGrid.appendChild(wrap);
    });
    photoArea.appendChild(thumbGrid);
  }
  // 追加ボタン
  if(!formState.photos||formState.photos.length<10){
    var addPhotoBtn=el('label',{style:'display:block;border:1.5px dashed #e8e8e4;border-radius:8px;padding:10px;text-align:center;cursor:pointer;color:#a8a8a4;font-size:12px;'});
    addPhotoBtn.textContent='📷 タップして写真を追加';
    var fileInp=el('input',{type:'file',accept:'image/*',multiple:'multiple'});
    fileInp.style.display='none';
    fileInp.addEventListener('change',function(){
      var files=Array.from(this.files);
      var remaining=10-(formState.photos||[]).length;
      files.slice(0,remaining).forEach(function(file){
        var reader=new FileReader();
        reader.onload=function(e){
          // 画像を圧縮
          var img=new Image();
          img.onload=function(){
            var canvas=document.createElement('canvas');
            var MAX=800;
            var w=img.width, h=img.height;
            if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}
            else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}
            canvas.width=w; canvas.height=h;
            canvas.getContext('2d').drawImage(img,0,0,w,h);
            var compressed=canvas.toDataURL('image/jpeg',0.6);
            if(!formState.photos)formState.photos=[];
            formState.photos.push(compressed);
            formState.init=false;
            render();
          };
          img.src=e.target.result;
        };
        reader.readAsDataURL(file);
      });
    });
    addPhotoBtn.appendChild(fileInp);
    photoArea.appendChild(addPhotoBtn);
  }
  sheet.appendChild(photoArea);

  // ボタン
  var btnRow=el('div',{style:'display:grid;grid-template-columns:'+(isEdit?'1fr 1fr 1fr':'1fr 1fr')+';gap:8px;margin-top:6px;'});
  var cancelBtn=el('button',{style:'padding:10px;border-radius:8px;font-size:13px;font-weight:500;border:none;cursor:pointer;background:#f2f2ef;color:#6b6b67;'});
  cancelBtn.textContent='キャンセル';
  cancelBtn.addEventListener('click',function(){state.modal=null;formState={};render();});
  btnRow.appendChild(cancelBtn);

  if(isEdit){
    var delBtn=el('button',{style:'padding:10px;border-radius:8px;font-size:13px;font-weight:500;border:none;cursor:pointer;background:#fee;color:#c0392b;'});
    delBtn.textContent='削除';
    delBtn.addEventListener('click',function(){
      if(confirm('削除しますか？')){
        state.events=state.events.filter(function(x){return x.id!==ev.id;});
        saveEvents(state.events);
        state.modal=null;formState={};render();
      }
    });
    btnRow.appendChild(delBtn);
  }

  var saveBtn=el('button',{style:'padding:10px;border-radius:8px;font-size:13px;font-weight:500;border:none;cursor:pointer;background:'+AC+';color:#fff;'});
  saveBtn.textContent=isEdit?'更新':'保存';
  saveBtn.addEventListener('click',function(){
    if(!formState.title.trim()){alert('タイトルを入力してください');return;}
    var saved={
      id:ev.id||Date.now().toString(),
      title:formState.title.trim(),
      startDate:formState.start,
      endDate:formState.end,
      date:formState.start,
      time:formState.time,
      endTime:formState.endTime,
      memo:formState.memo,
      color:formState.color,
      recurrence:formState.recurrence,
      notifMins:formState.notifMins,
      calId:formState.calId,
      photos:(isEdit ? (ev.photos||[]) : (formState.photos||[])),
    };
    if(isEdit){
      state.events=state.events.map(function(x){return x.id===ev.id?saved:x;});
      state.modal=null;
    } else {
      state.events.push(saved);
      if(formState.time){
        state.modal='reminder';
        state.reminderEv=saved;
      } else {
        state.modal=null;
      }
    }
    saveEvents(state.events);
    formState={};
    render();
  });
  btnRow.appendChild(saveBtn);
  sheet.appendChild(btnRow);

  overlay.appendChild(sheet);
  wrap.appendChild(overlay);
  setTimeout(function(){titleInp.focus();},100);
}

// ========== 移動モーダル ==========
var moveFormDate='';
function renderMoveModal(wrap){
  var ev=state.moveEv;
  moveFormDate=ev.startDate||ev.date;
  var overlay=el('div',{style:'position:fixed;left:0;top:0;bottom:0;width:100vw;background:rgba(0,0,0,.4);display:flex;align-items:flex-end;z-index:300;'});
  overlay.addEventListener('click',function(){state.modal=null;render();});
  var sheet=el('div',{style:'background:#fff;border-radius:18px 18px 0 0;padding:20px 14px 32px;width:100%;'});
  sheet.addEventListener('click',function(e){e.stopPropagation();});
  sheet.appendChild(el('div',{style:'width:32px;height:3px;background:#e8e8e4;border-radius:2px;margin:0 auto 16px;'}));
  sheet.appendChild(el('div',{style:'font-size:16px;font-weight:600;margin-bottom:6px;'},'予定を移動'));
  sheet.appendChild(el('div',{style:'font-size:13px;color:#6b6b67;margin-bottom:20px;'},'「'+ev.title+'」の移動先を選んでください'));
  sheet.appendChild(el('label',{style:'font-size:9px;color:#a8a8a4;font-weight:500;letter-spacing:0.5px;text-transform:uppercase;display:block;margin-bottom:6px;'},'移動先の日付'));
  var dateInp=el('input',{type:'date',style:'width:100%;padding:12px 14px;border:1.5px solid #e8e8e4;border-radius:8px;font-size:16px;font-family:inherit;background:#fff;color:#1a1a18;outline:none;margin-bottom:20px;box-sizing:border-box;'});
  dateInp.value=moveFormDate;
  dateInp.addEventListener('change',function(){moveFormDate=this.value;});
  sheet.appendChild(dateInp);
  var btnRow=el('div',{style:'display:grid;grid-template-columns:1fr 1fr;gap:8px;'});
  var cancelBtn=el('button',{style:'padding:13px;border-radius:8px;font-size:14px;font-weight:500;border:none;cursor:pointer;background:#f2f2ef;color:#6b6b67;'});
  cancelBtn.textContent='キャンセル';
  cancelBtn.addEventListener('click',function(){state.modal=null;render();});
  btnRow.appendChild(cancelBtn);
  var moveBtn=el('button',{style:'padding:13px;border-radius:8px;font-size:14px;font-weight:500;border:none;cursor:pointer;background:'+AC+';color:#fff;'});
  moveBtn.textContent='移動する';
  moveBtn.addEventListener('click',function(){
    var newDate=moveFormDate;
    state.events=state.events.map(function(x){
      if(x.id!==ev.id)return x;
      var dur=ev.endDate&&ev.startDate?Math.round((parseDS(ev.endDate)-parseDS(ev.startDate))/86400000):0;
      var newEnd=dur>0?toDS(addDays(parseDS(newDate),dur)):newDate;
      return Object.assign({},x,{startDate:newDate,endDate:newEnd,date:newDate});
    });
    saveEvents(state.events);
    state.modal=null;
    showToast(newDate.slice(5).replace('-','月')+'日に移動しました ✓');
    render();
  });
  btnRow.appendChild(moveBtn);
  sheet.appendChild(btnRow);
  overlay.appendChild(sheet);
  wrap.appendChild(overlay);
}

// ========== リマインダーモーダル ==========
function renderReminderModal(wrap){
  var ev=state.reminderEv;
  var overlay=el('div',{style:'position:fixed;left:0;top:0;bottom:0;width:100vw;background:rgba(0,0,0,.4);display:flex;align-items:flex-end;z-index:300;'});
  overlay.addEventListener('click',function(){state.modal=null;render();});
  var sheet=el('div',{style:'background:#fff;border-radius:18px 18px 0 0;padding:20px 16px 32px;width:100%;'});
  sheet.addEventListener('click',function(e){e.stopPropagation();});
  sheet.appendChild(el('div',{style:'width:32px;height:3px;background:#e8e8e4;border-radius:2px;margin:0 auto 16px;'}));
  sheet.appendChild(el('div',{style:'font-size:15px;font-weight:600;margin-bottom:6px;'},'リマインダーに追加しますか？'));
  sheet.appendChild(el('div',{style:'font-size:13px;color:#6b6b67;margin-bottom:20px;'},'「'+ev.title+'」を標準リマインダーアプリに追加して通知を受け取れます'));
  var btnRow=el('div',{style:'display:grid;grid-template-columns:1fr 1fr;gap:8px;'});
  var skipBtn=el('button',{style:'padding:12px;border-radius:8px;font-size:14px;font-weight:500;border:none;cursor:pointer;background:#f2f2ef;color:#6b6b67;'});
  skipBtn.textContent='スキップ';
  skipBtn.addEventListener('click',function(){state.modal=null;render();});
  btnRow.appendChild(skipBtn);
  var addBtn=el('button',{style:'padding:12px;border-radius:8px;font-size:14px;font-weight:500;border:none;cursor:pointer;background:'+AC+';color:#fff;'});
  addBtn.textContent='追加する';
  addBtn.addEventListener('click',function(){
    var title=encodeURIComponent(ev.title);
    var notes=encodeURIComponent(ev.memo||'家族カレンダーより');
    window.location.href='x-apple-reminderkit://REMCDReminder?title='+title+'&notes='+notes;
    state.modal=null;render();
  });
  btnRow.appendChild(addBtn);
  sheet.appendChild(btnRow);
  overlay.appendChild(sheet);
  wrap.appendChild(overlay);
}

// ========== トースト ==========
function showToast(msg){
  var t=document.createElement('div');
  t.textContent=msg;
  t.style.cssText='position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;z-index:400;white-space:nowrap;';
  document.body.appendChild(t);
  setTimeout(function(){t.remove();},2200);
}


// ========== 写真拡大モーダル ==========
function showPhotoViewer(photos, startIdx){
  var idx=startIdx||0;
  var overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;left:0;top:0;width:100vw;height:100vh;background:rgba(0,0,0,.92);z-index:500;display:flex;align-items:center;justify-content:center;';

  var img=document.createElement('img');
  img.style.cssText='max-width:95vw;max-height:85vh;object-fit:contain;border-radius:8px;';
  img.src=photos[idx];

  var counter=document.createElement('div');
  counter.style.cssText='position:absolute;top:16px;right:16px;color:#fff;font-size:13px;background:rgba(0,0,0,.4);padding:4px 10px;border-radius:12px;';
  counter.textContent=(idx+1)+'/'+photos.length;

  var closeBtn=document.createElement('button');
  closeBtn.style.cssText='position:absolute;top:16px;left:16px;background:rgba(0,0,0,.4);border:none;color:#fff;border-radius:50%;width:32px;height:32px;font-size:18px;cursor:pointer;';
  closeBtn.textContent='×';
  closeBtn.addEventListener('click',function(){document.body.removeChild(overlay);});

  function update(){
    img.src=photos[idx];
    counter.textContent=(idx+1)+'/'+photos.length;
  }

  if(photos.length>1){
    var prevBtn=document.createElement('button');
    prevBtn.style.cssText='position:absolute;left:8px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.4);border:none;color:#fff;border-radius:50%;width:36px;height:36px;font-size:20px;cursor:pointer;';
    prevBtn.textContent='‹';
    prevBtn.addEventListener('click',function(){idx=(idx-1+photos.length)%photos.length;update();});

    var nextBtn=document.createElement('button');
    nextBtn.style.cssText='position:absolute;right:8px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.4);border:none;color:#fff;border-radius:50%;width:36px;height:36px;font-size:20px;cursor:pointer;';
    nextBtn.textContent='›';
    nextBtn.addEventListener('click',function(){idx=(idx+1)%photos.length;update();});

    overlay.appendChild(prevBtn);
    overlay.appendChild(nextBtn);
  }

  overlay.addEventListener('click',function(e){
    if(e.target===overlay)document.body.removeChild(overlay);
  });

  overlay.appendChild(img);
  overlay.appendChild(counter);
  overlay.appendChild(closeBtn);
  document.body.appendChild(overlay);
}


// ========== Google Calendar連携 ==========
var GCAL_CLIENT_ID =  + CLIENT_ID + ;
var GCAL_SCOPES = 'https://www.googleapis.com/auth/calendar.readonly';
var gcalTokenClient = null;
var gcalAccessToken = null;

function initGoogleAuth(){
  if(!window.google) return;
  gcalTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GCAL_CLIENT_ID,
    scope: GCAL_SCOPES,
    callback: function(resp){
      if(resp.error) return;
      gcalAccessToken = resp.access_token;
      fetchGCalEvents();
    }
  });
}

function syncGoogleCalendar(){
  if(!gcalTokenClient){ initGoogleAuth(); }
  if(!gcalTokenClient){ alert('Google認証の初期化に失敗しました'); return; }
  gcalAccessToken ? fetchGCalEvents() : gcalTokenClient.requestAccessToken();
}

function fetchGCalEvents(){
  var now = new Date();
  var timeMin = new Date(now.getFullYear(), now.getMonth()-1, 1).toISOString();
  var timeMax = new Date(now.getFullYear(), now.getMonth()+3, 0).toISOString();
  var url = 'https://www.googleapis.com/calendar/v3/calendars/primary/events'
    + '?timeMin='+encodeURIComponent(timeMin)
    + '&timeMax='+encodeURIComponent(timeMax)
    + '&singleEvents=true&orderBy=startTime&maxResults=100';

  fetch(url, {headers:{Authorization:'Bearer '+gcalAccessToken}})
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(data.error){ gcalAccessToken=null; alert('エラー: '+data.error.message); return; }
      var items = data.items||[];
      // キャミーカレンダーのGCal予定を削除して再追加
      state.events = state.events.filter(function(ev){ return ev.fromGCal!==true; });
      items.forEach(function(item){
        if(!item.start) return;
        var startDate = (item.start.date || item.start.dateTime||'').slice(0,10);
        var endDate = (item.end.date || item.end.dateTime||'').slice(0,10);
        // 終日予定で終了日は1日前に調整
        if(item.end.date){
          var ed = new Date(endDate+'T12:00:00');
          ed.setDate(ed.getDate()-1);
          endDate = toDS(ed);
        }
        var startTime = '';
        if(item.start.dateTime){
          startTime = item.start.dateTime.slice(11,16);
        }
        state.events.push({
          id: 'gcal_'+item.id,
          title: item.summary||'(無題)',
          startDate: startDate,
          endDate: endDate,
          date: startDate,
          time: startTime,
          memo: item.description||'',
          color: '#e67e22',
          calId: 'kyami',
          fromGCal: true,
          photos: [],
        });
      });
      saveEvents(state.events);
      showToast('Googleカレンダーを同期しました ('+items.length+'件)');
      render();
    })
    .catch(function(e){ alert('同期失敗: '+e.message); });
}

// ========== 初期化 ==========
render();
setTimeout(initGoogleAuth, 1000);
</script>
